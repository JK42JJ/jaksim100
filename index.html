<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f3f1ec" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f1117" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="作心百日">
<meta name="description" content="作心百日 — 목표 5개로 100일 습관 만들기">
<title>作心百日</title>
<style>
  :root{
    --bg:#f3f1ec; --surface:#ffffff; --surface2:#f8f7f3;
    --ink:#22262f; --ink2:#6a7080; --ink3:#9ba1ac; --line:#e7e4dc; --line2:#f0eee7;
    --accent:#32519e; --accent-ink:#ffffff; --accent-soft:#eaeef8;
    --ok:#1b7a4e; --ok-soft:#e4f2ea; --warn:#96690a; --bad:#b23a2f; --bad-soft:#f9e9e7;
    --shadow:0 1px 2px rgba(30,34,46,.05), 0 6px 18px rgba(30,34,46,.04);
    --r:16px;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0f1117; --surface:#181b23; --surface2:#1e222d;
      --ink:#e8e9ee; --ink2:#9aa1b3; --ink3:#666d7e; --line:#272b36; --line2:#20242e;
      --accent:#8ba3f2; --accent-ink:#0f1117; --accent-soft:#242b45;
      --ok:#4cc487; --ok-soft:#1a2d24; --warn:#d9a23a; --bad:#e06459; --bad-soft:#342220;
      --shadow:none; }
  }
  :root[data-theme="light"]{ --bg:#f3f1ec; --surface:#fff; --surface2:#f8f7f3; --ink:#22262f; --ink2:#6a7080; --ink3:#9ba1ac; --line:#e7e4dc; --line2:#f0eee7; --accent:#32519e; --accent-ink:#fff; --accent-soft:#eaeef8; --ok:#1b7a4e; --ok-soft:#e4f2ea; --warn:#96690a; --bad:#b23a2f; --bad-soft:#f9e9e7; --shadow:0 1px 2px rgba(30,34,46,.05),0 6px 18px rgba(30,34,46,.04); }
  :root[data-theme="dark"]{ --bg:#0f1117; --surface:#181b23; --surface2:#1e222d; --ink:#e8e9ee; --ink2:#9aa1b3; --ink3:#666d7e; --line:#272b36; --line2:#20242e; --accent:#8ba3f2; --accent-ink:#0f1117; --accent-soft:#242b45; --ok:#4cc487; --ok-soft:#1a2d24; --warn:#d9a23a; --bad:#e06459; --bad-soft:#342220; --shadow:none; }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; background:var(--bg); }
  body{ color:var(--ink); line-height:1.55; font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR",system-ui,sans-serif; -webkit-font-smoothing:antialiased; font-variant-numeric:tabular-nums; }
  .wrap{ max-width:560px; margin:0 auto; padding:0 16px 80px; }
  .ico{ display:block; width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }

  /* ── 상단 (sticky) ── */
  .top{ position:sticky; top:0; z-index:5; background:var(--bg); padding:16px 0 11px; border-bottom:1px solid var(--line2); margin-bottom:4px; }
  .top-row{ display:flex; align-items:baseline; gap:10px; }
  .top h1{ font-size:16.5px; margin:0; font-weight:800; letter-spacing:.02em; }
  .day{ font-size:16.5px; font-weight:800; color:var(--accent); }
  .gen{ margin-left:auto; font-size:11px; color:var(--ink3); }
  .progress{ height:4px; border-radius:99px; background:var(--line); margin-top:10px; overflow:hidden; }
  .progress i{ display:block; height:100%; border-radius:99px; background:var(--accent); transition:width .4s; }
  .cov{ font-size:11px; color:var(--ink3); margin-top:7px; }
  .modebar{ display:flex; gap:6px; margin-top:11px; }
  .modebar button{ flex:1; font:inherit; font-size:12px; font-weight:700; padding:7px 4px; border-radius:9px; border:1px solid var(--line); background:var(--surface2); color:var(--ink2); cursor:pointer; }
  .modebar button.on{ background:var(--ink); border-color:var(--ink); color:var(--bg); }
  .tabbar{ display:flex; gap:6px; margin-top:8px; }
  .tabbar button{ flex:1; font:inherit; font-size:13px; font-weight:700; padding:8px 4px; border-radius:10px; border:1px solid var(--line); background:var(--surface); color:var(--ink2); cursor:pointer; }
  .tabbar button.on{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink); }
  .tabbar .tbn{ font-weight:700; opacity:.75; margin-left:4px; font-size:11.5px; }
  .tab{ display:none; } .tab.on{ display:block; }

  h2{ display:flex; align-items:center; gap:8px; font-size:11.5px; letter-spacing:.16em; color:var(--ink2); margin:24px 0 10px; font-weight:800; }
  h2 .cnt{ font-size:11px; font-weight:700; background:var(--accent-soft); color:var(--accent); border-radius:99px; padding:1px 8px; letter-spacing:0; }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); }

  /* ── 루틴(오늘의 5액션) ── */
  .rrow{ display:flex; align-items:center; gap:11px; padding:12px 14px; }
  .rrow + .rrow{ border-top:1px solid var(--line2); }
  .rcheck{ width:23px; height:23px; flex:none; border-radius:8px; border:1.5px solid var(--ink3); display:grid; place-items:center; cursor:pointer; background:transparent; transition:background .15s, border-color .15s; }
  .rcheck.on{ background:var(--ok); border-color:var(--ok); }
  .rcheck.on::after{ content:"✓"; color:#fff; font-size:13px; font-weight:800; }
  .ricon{ width:30px; height:30px; flex:none; display:grid; place-items:center; color:var(--accent); background:var(--accent-soft); border-radius:9px; }
  .ricon .ico{ width:18px; height:18px; }
  .rmain{ flex:1; min-width:0; cursor:pointer; user-select:none; overflow:hidden; }
  .rlabel{ font-size:14.5px; font-weight:600; }
  .rhint{ font-size:11px; color:var(--ink3); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rstrip{ display:flex; gap:2.5px; flex:none; }
  .rstrip i{ width:6px; height:14px; border-radius:3px; background:var(--line); }
  .rstrip i.on{ background:var(--ok); }
  .rstrip i.today{ outline:1.5px solid var(--accent); outline-offset:1px; }
  .rstrip i.today.on{ background:var(--ok); }

  /* ── 주간 리워드 ── */
  .weekcard{ padding:14px; margin-top:12px; }
  .wk-head{ display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:800; }
  .wk-head .ico{ width:17px; height:17px; color:var(--accent); }
  .wk-sub{ font-size:12px; color:var(--ink2); margin:5px 0 11px; }
  .week{ display:flex; gap:5px; }
  .week span{ flex:1; aspect-ratio:1; border-radius:8px; background:var(--surface2); border:1.5px solid var(--line); display:grid; place-items:center; font-size:11px; font-weight:700; color:var(--ink3); cursor:pointer; }
  .week span.on{ background:var(--ok); border-color:var(--ok); color:#fff; }
  .week span.today{ border-color:var(--accent); border-width:2px; }
  .wk-goal{ font-size:11.5px; color:var(--ink2); margin-top:10px; font-weight:600; }
  .wk-goal b{ color:var(--ok); }
  .claim{ width:100%; margin-top:11px; padding:11px; border:none; border-radius:12px; font:inherit; font-weight:800; font-size:13.5px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; }
  .claim .ico{ width:16px; height:16px; }
  .claim[disabled]{ background:var(--surface2); color:var(--ink3); box-shadow:inset 0 0 0 1.5px var(--line); cursor:not-allowed; }
  .claim.go{ background:var(--ok); color:#fff; }
  .claim.wait{ background:var(--accent-soft); color:var(--accent); cursor:default; }

  /* ── 결정 큐 (부모) ── */
  .queue{ display:flex; flex-direction:column; gap:12px; }
  .qitem{ padding:14px 16px 14px 19px; position:relative; overflow:hidden; }
  .qitem::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent); }
  .qhead{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
  .chip{ font-size:11px; font-weight:700; padding:2.5px 9px; border-radius:99px; background:var(--accent-soft); color:var(--accent); }
  .qtitle{ font-size:14.5px; font-weight:650; line-height:1.45; }
  .qnote{ font-size:12.5px; color:var(--ink2); margin-top:3px; }
  .qbtns{ display:flex; gap:8px; margin-top:12px; }
  .qbtns button{ font:inherit; font-weight:700; border-radius:11px; cursor:pointer; }
  .b-ok{ flex:1; font-size:13.5px; padding:11px 12px; border:none; background:var(--accent); color:var(--accent-ink); }
  .b-no{ flex:0 0 auto; font-size:13px; padding:11px 15px; border:1px solid var(--line); background:var(--surface); color:var(--bad); }
  .qdone{ font-size:12.5px; font-weight:700; margin-top:9px; }
  .qdone.ok{ color:var(--ok); } .qdone.no{ color:var(--bad); }
  .empty{ color:var(--ink3); font-size:13.5px; padding:16px; text-align:center; }

  /* ── 성장 ── */
  .growcard{ padding:16px; display:flex; align-items:center; gap:15px; }
  #hero{ width:78px; height:78px; flex:none; border-radius:14px; background:var(--surface2); box-shadow:inset 0 0 0 1px var(--line); }
  .grow-t{ font-size:15px; font-weight:800; }
  .grow-s{ font-size:12px; color:var(--ink2); margin-top:3px; line-height:1.45; }
  .lvbar{ height:6px; background:var(--surface2); border-radius:99px; margin-top:9px; overflow:hidden; box-shadow:inset 0 0 0 1px var(--line); }
  .lvbar i{ display:block; height:100%; background:var(--accent); border-radius:99px; transition:width .5s; }
  .dogam{ display:flex; gap:8px; overflow-x:auto; padding:4px 2px 10px; margin-top:12px; scrollbar-width:thin; }
  .stg{ flex:0 0 auto; width:56px; text-align:center; border:1.5px solid var(--line); border-radius:12px; padding:6px 4px 7px; background:var(--surface); position:relative; }
  .stg svg{ width:38px; height:38px; margin:0 auto; display:block; }
  .stg .lv{ font-size:10px; font-weight:800; color:var(--ink3); margin-top:2px; }
  .stg .nm{ font-size:9px; color:var(--ink3); }
  .stg.cur{ border-color:var(--accent); background:var(--accent-soft); }
  .stg.cur .lv{ color:var(--accent); }
  .stg.past .lv{ color:var(--ok); }
  .stg.future{ opacity:.5; } .stg.future svg{ filter:grayscale(.9); }

  /* ── 배지 (누적 발급) ── */
  .badges{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px 8px; padding:4px 2px 2px; }
  @media (max-width:400px){ .badges{ grid-template-columns:repeat(3,1fr); } }
  .badge{ text-align:center; }
  .bmedal{ position:relative; width:100%; max-width:70px; aspect-ratio:1; margin:0 auto 6px; }
  .bsvg{ display:block; width:100%; height:100%; overflow:visible; }
  .badge.bronze{ color:#c0824a; } .badge.silver{ color:#8f97a8; } .badge.gold{ color:#d29a2e; } .badge.legend{ color:var(--accent); }
  .bstar{ fill:currentColor; opacity:.32; transform-box:fill-box; transform-origin:center; }
  .bdisc{ fill:currentColor; }
  .bring{ fill:none; stroke:#fff; stroke-opacity:.55; stroke-width:1.4; }
  .bic path, .bic circle{ fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .badge.locked .bmedal{ filter:grayscale(1) opacity(.45); }
  .blk{ position:absolute; inset:0; display:grid; place-items:center; color:#fff; }
  .blk .ico{ width:20px; height:20px; opacity:.85; }
  .bname{ font-size:11px; font-weight:800; color:var(--ink); line-height:1.15; }
  .badge.locked .bname{ color:var(--ink3); }
  .bdesc{ font-size:9.5px; color:var(--ink3); margin-top:1px; }
  .badge.earned .bmedal{ animation:bfloat 3.6s ease-in-out infinite; }
  .badge.earned .bstar{ animation:bspin 9s linear infinite; }
  @keyframes bfloat{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
  @keyframes bspin{ to{transform:rotate(360deg)} }
  .badge.earned .bmedal::after{ content:""; position:absolute; left:12%; top:12%; width:76%; height:76%; border-radius:50%; pointer-events:none; background:linear-gradient(120deg,transparent 38%,rgba(255,255,255,.6) 50%,transparent 62%); background-size:250% 250%; animation:bshine 3.6s ease-in-out infinite; }
  @keyframes bshine{ 0%{background-position:160% 160%} 55%,100%{background-position:-60% -60%} }
  .issue{ display:flex; align-items:center; gap:15px; padding:16px; margin-bottom:6px; background:var(--accent-soft); border-color:color-mix(in srgb,var(--accent) 32%,var(--line)); }
  .issue .badge{ width:80px; flex:none; }
  .issue-t{ font-size:11px; font-weight:800; letter-spacing:.1em; color:var(--accent); }
  .issue-n{ font-size:18px; font-weight:800; margin-top:2px; }
  .issue-d{ font-size:12.5px; color:var(--ink2); margin-top:2px; }
  .badge-issue .bmedal{ animation:bissue 1.1s cubic-bezier(.2,.8,.3,1.5); }
  @keyframes bissue{ 0%{transform:scale(0) rotate(-40deg); opacity:0} 55%{transform:scale(1.18) rotate(10deg); opacity:1} 100%{transform:scale(1) rotate(0)} }

  /* ── AI 코치 챗봇 (코멘트) ── */
  .chat{ padding:0; overflow:hidden; }
  .chat-head{ display:flex; align-items:center; gap:11px; padding:13px 14px; border-bottom:1px solid var(--line2); }
  .chat-av{ width:38px; height:38px; border-radius:11px; display:grid; place-items:center; background:var(--accent); color:var(--accent-ink); flex:none; }
  .chat-av .ico{ width:20px; height:20px; }
  .chat-nm{ font-weight:800; font-size:13.5px; }
  .chat-st{ font-size:11px; color:var(--ink3); margin-top:1px; }
  .chat-log{ display:flex; flex-direction:column; gap:8px; padding:14px; max-height:240px; overflow-y:auto; }
  .cmsg{ max-width:82%; padding:9px 13px; font-size:13px; line-height:1.45; border-radius:14px; }
  .cmsg.coach{ align-self:flex-start; background:var(--surface2); color:var(--ink); border-bottom-left-radius:4px; }
  .cmsg.me{ align-self:flex-end; background:var(--accent); color:var(--accent-ink); border-bottom-right-radius:4px; }
  .chat-in{ display:flex; gap:8px; padding:10px 12px 12px; border-top:1px solid var(--line2); }
  .chat-in input{ flex:1; min-width:0; padding:11px 13px; border:1.5px solid var(--line); border-radius:11px; background:var(--surface2); color:var(--ink); font:inherit; font-size:13.5px; }
  .chat-in input:focus{ outline:none; border-color:var(--accent); }
  .chat-in button{ width:44px; flex:none; border:none; border-radius:11px; background:var(--accent); color:var(--accent-ink); display:grid; place-items:center; cursor:pointer; }
  .chat-in button .ico{ width:18px; height:18px; }

  /* ── 코치 FAB + 하단 시트 ── */
  #fab{ position:fixed; right:16px; bottom:calc(16px + env(safe-area-inset-bottom,0px)); z-index:8; width:54px; height:54px; border-radius:50%; border:none; background:var(--accent); color:var(--accent-ink); box-shadow:0 10px 26px -8px var(--accent), 0 2px 6px rgba(0,0,0,.15); cursor:pointer; display:grid; place-items:center; transition:transform .12s; }
  #fab:active{ transform:scale(.94); }
  #fab .ico{ width:25px; height:25px; }
  #fab[hidden]{ display:none; }
  #sheet{ position:fixed; inset:0; z-index:20; visibility:hidden; }
  #sheet.open{ visibility:visible; }
  .sheet-bg{ position:absolute; inset:0; background:rgba(10,12,20,.5); opacity:0; transition:opacity .3s; }
  #sheet.open .sheet-bg{ opacity:1; }
  .sheet-card{ position:absolute; left:0; right:0; bottom:0; max-width:560px; margin:0 auto; background:var(--surface); border-radius:22px 22px 0 0; box-shadow:0 -12px 44px rgba(0,0,0,.28); transform:translateY(101%); transition:transform .34s cubic-bezier(.2,.85,.25,1); max-height:82vh; display:flex; flex-direction:column; padding-bottom:env(safe-area-inset-bottom,0px); }
  #sheet.open .sheet-card{ transform:translateY(0); }
  .sheet-grip{ width:40px; height:4px; border-radius:99px; background:var(--line); margin:10px auto 2px; flex:none; cursor:pointer; }
  .sheet-head{ display:flex; align-items:center; gap:11px; padding:10px 14px 12px; border-bottom:1px solid var(--line2); }
  .sheet-head .chat-av{ width:38px; height:38px; border-radius:11px; display:grid; place-items:center; background:var(--accent); color:var(--accent-ink); flex:none; }
  .sheet-head .chat-av .ico{ width:20px; height:20px; }
  .sheet-x{ margin-left:auto; flex:none; width:32px; height:32px; border-radius:9px; border:1px solid var(--line); background:var(--surface2); color:var(--ink2); font-size:15px; cursor:pointer; line-height:1; }
  #sheet .chat-log{ max-height:none; flex:1; }
  #sheet .chat-in{ border-top:1px solid var(--line2); }

  /* ── 지표(기록) ── */
  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .stat{ padding:13px 15px 14px; }
  .stat h3{ margin:0 0 7px; font-size:11px; color:var(--ink2); font-weight:800; letter-spacing:.08em; }
  .big{ font-size:25px; font-weight:800; letter-spacing:-.02em; line-height:1.15; }
  .big small{ font-size:12px; font-weight:600; color:var(--ink3); margin-left:2px; }
  .stat .sub{ font-size:12px; color:var(--ink2); margin-top:3px; }

  /* ── 위저드 ── */
  .steps{ display:flex; gap:6px; height:4px; margin-bottom:24px; }
  .steps i{ flex:1; border-radius:9px; background:var(--line); transition:background .35s; }
  .steps i.on{ background:var(--accent); }
  .steps i.did{ background:color-mix(in srgb,var(--accent) 55%,var(--line)); }
  .kicker{ font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin:0 0 6px; }
  .q{ font-size:22px; font-weight:800; letter-spacing:-.01em; margin:0 0 6px; line-height:1.2; }
  .hint{ font-size:13.5px; color:var(--ink2); margin:0 0 20px; line-height:1.55; }
  .field{ width:100%; padding:14px 15px; border:1.5px solid var(--line); border-radius:13px; background:var(--surface2); color:var(--ink); font:inherit; font-size:15px; }
  .field:focus{ outline:none; border-color:var(--accent); }
  .setlbl{ display:block; font-size:11.5px; font-weight:800; color:var(--ink2); letter-spacing:.06em; margin-bottom:6px; }
  .picks{ display:grid; gap:10px; }
  .pick{ display:flex; align-items:center; gap:13px; padding:15px; border:1.5px solid var(--line); border-radius:15px; background:var(--surface2); cursor:pointer; text-align:left; }
  .pick.sel{ border-color:var(--accent); background:var(--accent-soft); }
  .pick .pemo{ width:44px; height:44px; display:grid; place-items:center; background:var(--surface); border-radius:12px; flex:none; box-shadow:inset 0 0 0 1px var(--line); color:var(--accent); }
  .pick .pk-t{ display:block; font-weight:700; font-size:15px; }
  .pick .pk-s{ display:block; font-size:12.5px; color:var(--ink2); margin-top:2px; }
  .goals{ display:flex; flex-direction:column; gap:9px; }
  .goal-row{ display:flex; align-items:center; gap:10px; background:var(--surface2); border:1.5px solid var(--line); border-radius:13px; padding:8px 10px; }
  .goal-row .gi{ width:32px; height:32px; display:grid; place-items:center; color:var(--accent); flex:none; }
  .goal-row .gi .ico{ width:19px; height:19px; }
  .goal-row input{ border:none; background:transparent; font:inherit; font-size:14.5px; font-weight:600; color:var(--ink); width:100%; padding:6px 0; }
  .goal-row input:focus{ outline:none; }
  .goal-row input::placeholder{ color:var(--ink3); opacity:1; }
  .goal-row .min{ font-size:11.5px; color:var(--ink3); background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:4px 8px; white-space:nowrap; flex:none; }
  .seg{ display:flex; gap:8px; }
  .seg button{ flex:1; padding:16px 6px; border:1.5px solid var(--line); border-radius:14px; background:var(--surface2); color:var(--ink); font:inherit; cursor:pointer; }
  .seg button .bg{ display:block; font-size:22px; font-weight:800; }
  .seg button .lbl{ display:block; font-size:11.5px; color:var(--ink3); margin-top:3px; }
  .seg button.sel{ border-color:var(--accent); background:var(--accent-soft); }
  .seg button.sel .lbl{ color:var(--accent); }
  .wiznote{ font-size:12.5px; color:var(--ink2); margin:12px 2px 0; }
  .nav{ display:flex; gap:10px; margin-top:26px; }
  .btn{ flex:1; padding:15px; border-radius:14px; border:none; font:inherit; font-weight:800; font-size:15px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:8px; }
  .btn .ico{ width:19px; height:19px; }
  .btn-primary{ background:var(--accent); color:var(--accent-ink); }
  .btn-ghost{ flex:0 0 auto; background:transparent; color:var(--ink2); border:1.5px solid var(--line); padding:0 20px; }

  .hero-wiz{ text-align:center; padding:34px 4px 8px; }

  #toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--ink); color:var(--bg); padding:10px 20px; border-radius:12px; font-size:13px; font-weight:600; opacity:0; transition:opacity .25s, transform .25s; pointer-events:none; z-index:9; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  #hero.evolve{ animation:glow 1.1s ease; }
  @keyframes glow{ 0%{filter:none} 45%{filter:drop-shadow(0 0 10px var(--accent))} 100%{filter:none} }
  .grow-anim{ transform-box:fill-box; transform-origin:center bottom; animation:breathe 4.2s ease-in-out infinite; }

<script>
(function(){

    math:'<rect x="4" y="4" width="16" height="16" rx="3.5"/><path d="M7.4 9.5h3M8.9 8v3"/><path d="M13.6 9.5h3"/><path d="M7.7 14.3l2.6 2.6M10.3 14.3l-2.6 2.6"/><path d="M13.6 15.1h3M13.6 17h3"/>',
    stopwatch:'<circle cx="12" cy="13.5" r="7"/><path d="M12 13.5V9.6"/><path d="M10 3.5h4"/><path d="M12 3.5v2.6"/><path d="M18.4 7l1.4-1.4"/>',
    journal:'<rect x="5" y="3.5" width="14" height="17" rx="2.2"/><path d="M8.7 3.5v17"/><path d="M14 8.7c.7-1 2.3-.5 2.3.7 0 1.3-2.3 2.6-2.3 2.6s-2.3-1.3-2.3-2.6c0-1.2 1.6-1.7 2.3-.7z" fill="currentColor" stroke="none"/>',
    flame:'<path d="M12 3.5c.5 3 3.8 4.2 3.8 7.8A3.8 3.8 0 0 1 8.2 11.3c0-1.4.5-2.3 1.1-2.9.3 1 .9 1.5 1.5 1.5C11.6 9 11 6.2 12 3.5z" fill="currentColor" stroke="none"/>',
    gift:'<rect x="4" y="9.5" width="16" height="10.5" rx="1.8"/><path d="M4 13.5h16"/><path d="M12 9.5V20"/><path d="M12 9.5C11.3 7 9 6.4 8 7.4c-1 1 .3 2.1 4 2.1zM12 9.5c.7-2.5 3-3.1 4-2.1 1 1-.3 2.1-4 2.1z" fill="currentColor" stroke="none"/>',
    check:'<path d="M4.5 12.5l4.5 4.5 10.5-11"/>',
    send:'<path d="M21 3.5L3 11l7 2.5L12.5 21 21 3.5z"/><path d="M10 13.5L21 3.5"/>',
    lock:'<rect x="5" y="10.5" width="14" height="9.5" rx="2.2"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5"/>',
    trophy:'<path d="M7 4.5h10V8a5 5 0 0 1-10 0z"/><path d="M7 5.5H4.6A2.4 2.4 0 0 0 7 8M17 5.5h2.4A2.4 2.4 0 0 1 17 8"/><path d="M12 13v3M9.5 20h5M10 20l.4-3.2h3.2L14 20"/>'
  };
  function ic(k,cls){ return '<svg class="ico'+(cls?' '+cls:'')+'" viewBox="0 0 24 24" aria-hidden="true">'+(IC[k]||'')+'</svg>'; }

  var STAGES=['씨앗','새싹','떡잎','잎새','어린줄기','꽃봉오리','개화','열매','무성한잎','큰나무'];
  var ME_GOALS=[{t:'인강 완강',min:'하루 2강',ic:'play'},{t:'오답노트',min:'하루 20분',ic:'pencil'},{t:'영단어',min:'하루 30개',ic:'globe'},{t:'체력 러닝',min:'하루 10분',ic:'pulse'},{t:'컨디션·명상',min:'하루 5분',ic:'breathe'}];
  var CHILD_GOALS=[{t:'책 읽기',min:'하루 10p',ic:'book'},{t:'수학 문제집',min:'하루 2p',ic:'math'},{t:'영어 문장',min:'하루 3문장',ic:'globe'},{t:'줄넘기',min:'하루 100개',ic:'stopwatch'},{t:'감사일기',min:'하루 5분',ic:'journal'}];

  // ── 상태 ──
  var st=null;
  function load(){ try{ st=JSON.parse(localStorage.getItem(KEY)); }catch(e){ st=null; } }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(st)); }catch(e){} }
  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove('show');},1600); }

  // ── 날짜 유틸 (브라우저 로컬 시간) ──
  function iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function today(){ return iso(new Date()); }
  function addDays(isoStr,n){ var d=new Date(isoStr+'T00:00:00'); d.setDate(d.getDate()+n); return iso(d); }
  function dayNum(){ var s=new Date(st.start+'T00:00:00'), t=new Date(today()+'T00:00:00'); return Math.floor((t-s)/86400000)+1; }
  function mondayOf(isoStr){ var d=new Date(isoStr+'T00:00:00'); var wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); return iso(d); }
  function dayDone(d){ var l=st.log[d]; return !!l && l.some(function(x){return x;}); }
  function totalDone(){ var n=0; for(var k in st.log){ if(dayDone(k)) n++; } return n; }
  function level(){ return Math.max(1, Math.min(10, 1+Math.floor(totalDone()/5))); }
  function weekHits(){ var mon=mondayOf(today()), n=0; for(var i=0;i<7;i++){ if(dayDone(addDays(mon,i))) n++; } return n; }

  // ── 성장 캐릭터 (레벨별 SVG) ──
  function plant(level){
    level=Math.max(1,Math.min(10,level));
    var g=['<ellipse cx="36" cy="59" rx="19" ry="3.4" fill="var(--line)"/>','<path d="M18 57q18-6 36 0" stroke="var(--ok)" stroke-width="1.8" stroke-linecap="round" opacity=".5"/>'];
    if(level===1){ g.push('<ellipse cx="36" cy="53" rx="4" ry="5" fill="var(--accent)"/>'); g.push('<path class="leafR" d="M36 49 C38 47 40 45 42.5 45.5" stroke="var(--ok)" stroke-width="2.4" stroke-linecap="round"/>'); return g.join(''); }
    var topY=Math.round(55-level*3.2), tw=(2.4+level*0.22).toFixed(1);
    g.push('<path d="M36 57 C36 48 36 '+(topY+8)+' 36 '+topY+'" stroke="var(--ok)" stroke-width="'+tw+'" stroke-linecap="round"/>');
    var pairs=Math.min(3,Math.floor(level/2));
    for(var p=0;p<pairs;p++){ var ly=57-9-p*8;
      g.push('<path class="leafL" d="M36 '+ly+' C27 '+ly+' 23 '+(ly-6)+' 24 '+(ly-9)+' C31 '+(ly-8)+' 36 '+(ly-4)+' 36 '+ly+' Z" fill="var(--ok)"/>');
      g.push('<path class="leafR" d="M36 '+ly+' C45 '+ly+' 49 '+(ly-6)+' 48 '+(ly-9)+' C41 '+(ly-8)+' 36 '+(ly-4)+' 36 '+ly+' Z" fill="var(--ok)" opacity=".82"/>'); }
    var cc=level>=10?'var(--accent)':'var(--ok)';
    if(level>=6){ var cr=6+(level-6)*1.5; [[0,0,1],[-cr*0.8,cr*0.2,.85],[cr*0.8,cr*0.2,.85],[0,-cr*0.55,.9]].forEach(function(o){ g.push('<circle cx="'+(36+o[0]).toFixed(1)+'" cy="'+(topY+o[1]).toFixed(1)+'" r="'+(cr*0.82).toFixed(1)+'" fill="'+cc+'" opacity="'+o[2]+'"/>'); }); }
    if(level>=2&&level<6) g.push('<circle class="bud" cx="36" cy="'+topY+'" r="'+(3+level*0.3).toFixed(1)+'" fill="var(--accent)"/>');
    if(level>=6&&level<10){ for(var a=0;a<5;a++){ var an=a/5*6.283; g.push('<circle cx="'+(36+Math.cos(an)*4.6).toFixed(1)+'" cy="'+(topY+Math.sin(an)*4.6).toFixed(1)+'" r="2.5" fill="var(--accent)"/>'); } g.push('<circle cx="36" cy="'+topY+'" r="2.3" fill="var(--accent-soft)"/>'); }
    if(level>=8){ g.push('<circle cx="30" cy="'+(topY+6)+'" r="2.3" fill="var(--accent)"/>'); g.push('<circle cx="43" cy="'+(topY+3)+'" r="2.3" fill="var(--accent)"/>'); }
    return g.join('');
  }
  function heroSVG(level){ return '<svg id="hero" viewBox="0 0 72 72" fill="none"><g class="grow-anim">'+plant(level)+'</g></svg>'; }
  function miniSVG(level){ return '<svg viewBox="0 0 72 72" fill="none">'+plant(level)+'</svg>'; }

  // ── 배지 (누적 발급) ──
  var BADGES=[
    {n:1,name:'첫걸음',desc:'첫 달성',tier:'bronze',icon:'flag'},
    {n:3,name:'작심삼일 돌파',desc:'3일 누적',tier:'bronze',icon:'flame'},
    {n:7,name:'첫 주 완성',desc:'7일 누적',tier:'silver',icon:'star'},
    {n:14,name:'2주 연속',desc:'14일 누적',tier:'silver',icon:'star'},
    {n:21,name:'습관 형성',desc:'21일 누적',tier:'gold',icon:'medal'},
    {n:50,name:'반환점',desc:'50일 누적',tier:'gold',icon:'trophy'},
    {n:75,name:'막판 스퍼트',desc:'75일 누적',tier:'gold',icon:'trophy'},
    {n:100,name:'작심백일 완주',desc:'100일 완주',tier:'legend',icon:'crown'}
  ];
  var BIC={
    flag:'<path d="M6 3v18M6 4h12l-2.6 3.5L18 11H6"/>',
    star:'<path d="M12 3.2l2.7 5.5 6 .9-4.3 4.2 1 6-5.4-2.8-5.4 2.8 1-6L3.3 9.6l6-.9z"/>',
    medal:'<circle cx="12" cy="14" r="5.5"/><path d="M9.5 3l2.5 5 2.5-5"/><path d="M12 11.7l.9 1.9 2 .3-1.5 1.4.4 2-1.8-1-1.8 1 .4-2L9.1 13.9l2-.3z"/>',
    crown:'<path d="M4 8l3.5 3.5L12 5l4.5 6.5L20 8l-1.5 10h-13z"/><path d="M5.5 21h13"/>',
    flame:'<path d="M12 3c.6 3 3.8 4.5 3.8 8A3.8 3.8 0 0 1 8.2 11c0-1.4.6-2.4 1.2-3 .3 1 .9 1.6 1.6 1.6C11.6 8 11 5.5 12 3z"/>',
    trophy:'<path d="M7 4.5h10V8a5 5 0 0 1-10 0z"/><path d="M7 5.5H4.6A2.4 2.4 0 0 0 7 8M17 5.5h2.4A2.4 2.4 0 0 1 17 8"/><path d="M12 13v3M9.5 20h5M10 20l.4-3.2h3.2L14 20"/>'
  };
  function starburst(cx,cy,ro,ri,pts){ var p=''; for(var i=0;i<pts*2;i++){ var r=(i%2)?ri:ro, a=i/(pts*2)*6.2832-1.5708; p+=(i?'L':'M')+(cx+Math.cos(a)*r).toFixed(1)+' '+(cy+Math.sin(a)*r).toFixed(1); } return p+'Z'; }
  function badgeSVG(iconKey){ return '<svg viewBox="0 0 64 64" class="bsvg" aria-hidden="true"><path class="bstar" d="'+starburst(32,32,27,20,12)+'"/><circle class="bdisc" cx="32" cy="32" r="18"/><circle class="bring" cx="32" cy="32" r="18"/><g class="bic" transform="translate(20 20)">'+(BIC[iconKey]||'')+'</g></svg>'; }
  function badgeCount(){ var td=totalDone(); return BADGES.filter(function(b){return td>=b.n;}).length; }

  /* ═══ 위저드 ═══ */
  var W={ step:1, persona:'me', title:'', days:100, notify:'21:00', goalText:['','','','',''] };
  function exGoals(){ return W.persona==='me'?ME_GOALS:CHILD_GOALS; }
  function finalGoals(){ return exGoals().map(function(g,i){ return {t:(W.goalText[i]||'').trim()||g.t, min:g.min, ic:g.ic}; }); }
  function renderWizard(){
    var fb=document.getElementById('fab'); if(fb) fb.hidden=true; closeSheet();
    if(W.step===1){
      app.innerHTML='<div class="hero-wiz"><span class="eyebrow">100일 습관 만들기 · 작심백일</span><h1><span class="k">作心百日</span></h1><p>목표 5개만 넣으면 100일 프로그램이 자동으로 짜집니다.</p></div>'+
        '<div style="padding:8px 0 0">'+steps(1)+
        '<p class="kicker">STEP 1 · 누구의 100일</p><p class="q">누가 시작하나요?</p><div class="picks">'+
        '<button class="pick '+(W.persona==='me'?'sel':'')+'" data-p="me"><span class="pemo">'+ic('personMe')+'</span><span><span class="pk-t">나</span><span class="pk-s">수능·자기계발 트랙</span></span></button>'+
        '<button class="pick '+(W.persona==='child'?'sel':'')+'" data-p="child"><span class="pemo">'+ic('family')+'</span><span><span class="pk-t">자녀 방학 플랜</span><span class="pk-s">아이 습관 5개 · 부모가 리워드 관리</span></span></button>'+
        '</div>'+wnav()+'</div>';
    } else {
      app.innerHTML='<div style="padding:34px 0 0">'+steps(W.step)+wbody()+wnav()+'</div>';
    }
    bindWizard();
  }
  function steps(cur){ var h='<div class="steps">'; for(var i=1;i<=5;i++){ h+='<i class="'+(i===cur?'on':(i<cur?'did':''))+'"></i>'; } return h+'</div>'; }
  function wbody(){
    if(W.step===2) return '<p class="kicker">STEP 2 · 큰 목표</p><p class="q">뭘 이루고 싶어요?</p><p class="hint">한 문장이면 충분해요.</p><input class="field" id="ti" placeholder="'+(W.persona==='me'?'예) 6월 모평보다 한 등급 올리기':'예) 스스로 하는 방학 습관 만들기')+'" value="'+esc(W.title)+'">';
    if(W.step===3) return '<p class="kicker">STEP 3 · 핵심 목표 5개</p><p class="q">매일 쌓을 5가지</p><p class="hint">아래 회색 글씨는 <b>예시</b>예요 — 눌러서 우리에 맞게 바꾸세요. (그대로 둬도 예시로 시작돼요.) 이 5개가 매일의 <b>데일리 5액션</b>이 됩니다.</p><div class="goals">'+exGoals().map(function(g,i){ return '<div class="goal-row"><span class="gi">'+ic(g.ic)+'</span><input data-gi="'+i+'" value="'+esc(W.goalText[i]||'')+'" placeholder="'+esc(g.t)+'"><span class="min">'+esc(g.min)+'</span></div>'; }).join('')+'</div>';
    if(W.step===4){ var o=[[66,'습관 형성'],[100,'100일 작전'],[200,'장기전']]; return '<p class="kicker">STEP 4 · 기간</p><p class="q">며칠 동안?</p><p class="hint">백일이 가장 의미 있어요.</p><div class="seg">'+o.map(function(x){ return '<button data-d="'+x[0]+'" class="'+(W.days===x[0]?'sel':'')+'"><span class="bg">'+x[0]+'</span><span class="lbl">'+x[1]+'</span></button>'; }).join('')+'</div><p class="wiznote">하루 1개만 해도 달성으로 인정 — 안 하는 날을 없애는 게 핵심.</p>'; }
    var t=['07:00','21:00','22:00']; return '<p class="kicker">STEP 5 · 리마인드</p><p class="q">언제 알려줄까요?</p><p class="hint">매일 이 시간에 오늘의 5액션을 보여줘요.</p><div class="seg">'+t.map(function(x){ return '<button data-n="'+x+'" class="'+(W.notify===x?'sel':'')+'"><span class="bg">'+x+'</span><span class="lbl">'+(x==='07:00'?'아침형':(x==='21:00'?'저녁 정리':'자기 전'))+'</span></button>'; }).join('')+'</div>';
  }
  function wnav(){ return '<div class="nav">'+(W.step>1?'<button class="btn btn-ghost" data-w="back">뒤로</button>':'')+'<button class="btn btn-primary" data-w="next">'+(W.step===5?ic('flame')+'100일 시작하기':'다음')+'</button></div>'; }
  function bindWizard(){
    app.querySelectorAll('[data-p]').forEach(function(b){ b.onclick=function(){ W.persona=b.dataset.p; W.goalText=['','','','','']; renderWizard(); }; });
    app.querySelectorAll('[data-d]').forEach(function(b){ b.onclick=function(){ W.days=+b.dataset.d; renderWizard(); }; });
    app.querySelectorAll('[data-n]').forEach(function(b){ b.onclick=function(){ W.notify=b.dataset.n; renderWizard(); }; });
    var ti=app.querySelector('#ti'); if(ti) ti.oninput=function(){ W.title=ti.value; };
    app.querySelectorAll('[data-gi]').forEach(function(inp){ inp.oninput=function(){ W.goalText[+inp.dataset.gi]=inp.value; }; });
    var nx=app.querySelector('[data-w="next"]'); if(nx) nx.onclick=function(){ if(W.step<5){ W.step++; renderWizard(); } else finishWizard(); };
    var bk=app.querySelector('[data-w="back"]'); if(bk) bk.onclick=function(){ W.step--; renderWizard(); };
  }
  function finishWizard(){
    st={ persona:W.persona, title:W.title||(W.persona==='me'?'나의 100일':'우리 아이 100일'), days:W.days, notify:W.notify,
      goals:finalGoals(), start:today(), log:{}, rewards:[], chat:[], seenBadges:[],
      rewardItem:(W.persona==='child'?'게임 30분':'치팅밀 1회'), rewardBonus:'',
      tab:'today', mode:'child' };
    save(); toast('100일 프로그램이 시작됐어요'); renderApp();
  }
  function rewardItem(){ return (st&&st.rewardItem) || (st&&st.persona==='child'?'게임 30분':'치팅밀 1회'); }

  /* ═══ 대시보드 ═══ */
  function renderApp(){
    if(!st){ renderWizard(); return; }
    var fb=document.getElementById('fab'); if(fb) fb.hidden=false;
    var isChild=st.persona==='child';
    var dn=dayNum(), pct=Math.max(0,Math.min(100, Math.round((dn-1)/st.days*100)));
    var tabs = isChild
      ? (st.mode==='parent' ? [['set','보상 설정'],['stats','기록']] : [['today','오늘'],['badge','배지']])
      : [['today','오늘'],['badge','배지'],['stats','기록']];
    if(!tabs.some(function(t){return t[0]===st.tab;})) st.tab=tabs[0][0];
    var h='<div class="top"><div class="top-row"><h1>作心百日</h1><span class="day">D-'+Math.max(0,st.days-dn+1)+'</span><span class="gen">DAY '+dn+' / '+st.days+' · 배지 '+badgeCount()+'개</span></div>'+
      '<div class="progress"><i style="width:'+pct+'%"></i></div><div class="cov">'+esc(st.title)+' · 이번 주 '+weekHits()+'/7일 달성</div>';
    if(isChild) h+='<div class="modebar"><button class="'+(st.mode==='child'?'on':'')+'" data-mode="child">아이 화면</button><button class="'+(st.mode==='parent'?'on':'')+'" data-mode="parent">부모 화면</button></div>';
    h+='<div class="tabbar">'+tabs.map(function(t){ return '<button class="'+(st.tab===t[0]?'on':'')+'" data-tab="'+t[0]+'">'+t[1]+'</button>'; }).join('')+'</div></div>';
    h+='<div id="tabc"></div>';
    h+='<div class="footer">作心百日 · 진행은 이 브라우저에 저장됩니다. <button class="reset" id="reset">초기화</button></div>';
    app.innerHTML=h;
    app.querySelectorAll('[data-tab]').forEach(function(b){ b.onclick=function(){ st.tab=b.dataset.tab; save(); renderApp(); }; });
    app.querySelectorAll('[data-mode]').forEach(function(b){ b.onclick=function(){ st.mode=b.dataset.mode; st.tab=null; save(); renderApp(); }; });
    var rs=app.querySelector('#reset'); if(rs) rs.onclick=function(){ if(confirm('진행 기록을 지우고 처음부터 다시 시작할까요?')){ localStorage.removeItem(KEY); st=null; W.step=1; W.persona='me'; W.title=''; W.days=100; W.notify='21:00'; W.goalText=['','','','','']; renderWizard(); } };
    renderTab();
  }

  function renderTab(){
    var c=document.getElementById('tabc'); if(!c) return;
    if(st.tab==='today') c.innerHTML=viewToday();
    else if(st.tab==='badge') c.innerHTML=viewBadges();
    else if(st.tab==='stats') c.innerHTML=viewStats();
    else if(st.tab==='set') c.innerHTML=viewSet();
    bindTab();
  }

  function viewToday(){
    var d=today(); var log=st.log[d]||[false,false,false,false,false];
    var rows=st.goals.map(function(g,i){
      return '<div class="rrow"><span class="ricon">'+ic(g.ic)+'</span><div class="rmain" data-t="'+i+'"><div class="rlabel">'+esc(g.t)+'</div><div class="rhint">최소 '+esc(g.min)+' · 1개만 해도 오늘 달성</div></div><div class="rcheck '+(log[i]?'on':'')+'" data-t="'+i+'" role="checkbox" aria-checked="'+!!log[i]+'"></div></div>';
    }).join('');
    return '<h2>오늘의 루틴 <span class="cnt">'+log.filter(Boolean).length+'/5</span></h2><div class="card">'+rows+'</div>'+dailyStrip()+weekBlock();
  }
  function dailyStrip(){
    var d=today(), mon14=addDays(d,-13), cells='';
    for(var i=0;i<14;i++){ var dd=addDays(mon14,i); cells+='<i class="'+(dayDone(dd)?'on':'')+(dd===d?' today':'')+'"></i>'; }
    return '<div class="card" style="padding:11px 14px;margin-top:12px;display:flex;align-items:center;gap:10px"><span style="font-size:11.5px;font-weight:800;color:var(--ink2);letter-spacing:.06em">최근 14일</span><div class="rstrip" style="flex:1;justify-content:flex-end">'+cells+'</div></div>';
  }

  function weekBlock(){
    var mon=mondayOf(today()), td=today(), hits=weekHits();
    var lbl=['월','화','수','목','금','토','일'];
    var cells=''; for(var i=0;i<7;i++){ var dd=addDays(mon,i); var on=dayDone(dd); cells+='<span class="'+(on?'on':'')+(dd===td?' today':'')+'" data-wd="'+dd+'">'+(on?'✓':lbl[i])+'</span>'; }
    var claimed=st.rewards.some(function(r){return r.week===mon;});
    var item=rewardItem(), bonus=st.rewardBonus||'';
    var btn;
    if(claimed){ btn='<button class="claim go" disabled>'+ic('trophy')+'이번 주 리워드 획득 완료</button>'; }
    else if(hits>=5){ btn='<button class="claim go" data-claim="1">'+ic('gift')+'이번 주 리워드 받기</button>'; }
    else btn='<button class="claim" disabled>'+ic('lock')+(5-hits)+'일 더 채우면 리워드</button>';
    return '<div class="card weekcard"><div class="wk-head">'+ic('gift')+'이번 주 리워드 · '+esc(item)+'</div><div class="wk-sub">5일 달성하면 '+(st.persona==='child'?'스스로 받아요':'스스로에게 보상')+'.'+(bonus?' 보너스: '+esc(bonus):'')+'</div>'+
      '<div class="week">'+cells+'</div><div class="wk-goal">목표 5일 · <b>'+hits+'</b>/5일 달성</div>'+btn+'</div>';
  }

  function viewBadges(){
    var td=totalDone();
    var earned=BADGES.filter(function(b){return td>=b.n;});
    var seen=st.seenBadges||[];
    var news=earned.filter(function(b){return seen.indexOf(b.n)<0;});
    var hero='';
    if(news.length){ var nb=news[news.length-1];
      hero='<div class="card issue"><div class="badge '+nb.tier+' earned badge-issue"><div class="bmedal">'+badgeSVG(nb.icon)+'</div></div>'+
        '<div><div class="issue-t">새 배지 획득</div><div class="issue-n">'+esc(nb.name)+'</div><div class="issue-d">'+esc(nb.desc)+'</div></div></div>';
      st.seenBadges=seen.concat(news.map(function(b){return b.n;})); save();
    }
    var next=null; for(var k=0;k<BADGES.length;k++){ if(td<BADGES[k].n){ next=BADGES[k]; break; } }
    var prog = next
      ? '<div class="card" style="padding:14px"><div class="grow-s" style="margin:0 0 9px"><b>누적 '+td+'일</b> · 다음 배지 «'+esc(next.name)+'»까지 '+(next.n-td)+'일</div><div class="lvbar"><i style="width:'+Math.min(100,Math.round(td/next.n*100))+'%"></i></div></div>'
      : '<div class="card" style="padding:14px"><div class="grow-s" style="margin:0"><b>모든 배지 획득!</b> 누적 '+td+'일 — 作心百日 완주.</div></div>';
    var grid='<div class="badges">'+BADGES.map(function(b){ var e=td>=b.n;
      return '<div class="badge '+b.tier+' '+(e?'earned':'locked')+'"><div class="bmedal">'+badgeSVG(b.icon)+(e?'':'<span class="blk">'+ic('lock')+'</span>')+'</div><div class="bname">'+esc(b.name)+'</div><div class="bdesc">'+(e?esc(b.desc):b.n+'일')+'</div></div>';
    }).join('')+'</div>';
    return hero+'<h2>배지 <span class="cnt">'+earned.length+'/'+BADGES.length+'</span></h2>'+prog+'<h2>배지 도감</h2>'+grid;
  }

  function viewStats(){
    var td=totalDone(), dn=dayNum(), rate=dn>0?Math.round(td/Math.max(1,Math.min(dn,st.days))*100):0;
    var got=st.rewards.length;
    return '<h2>기록</h2><div class="grid">'+
      '<div class="card stat"><h3>배지</h3><div class="big">'+badgeCount()+'<small>/ '+BADGES.length+'</small></div><div class="sub">누적 발급</div></div>'+
      '<div class="card stat"><h3>이번 주</h3><div class="big">'+weekHits()+'<small>/ 7일</small></div><div class="sub">주 5일 달성 시 리워드</div></div>'+
      '<div class="card stat"><h3>총 달성</h3><div class="big">'+td+'<small>일</small></div><div class="sub">전체 달성률 '+rate+'%</div></div>'+
      '<div class="card stat"><h3>남은 기간</h3><div class="big">'+Math.max(0,st.days-dn+1)+'<small>일</small></div><div class="sub">DAY '+dn+' / '+st.days+'</div></div>'+
      '<div class="card stat" style="grid-column:1/-1"><h3>받은 리워드</h3><div class="big">'+got+'<small>회</small></div><div class="sub">'+esc(rewardItem())+' · 5일 달성 시 스스로 획득</div></div></div>';
  }

  function viewSet(){
    var item=rewardItem(), bonus=st.rewardBonus||'', got=st.rewards.length;
    return '<h2>보상 설정</h2>'+
      '<div class="card" style="padding:16px">'+
        '<div class="grow-s" style="margin:0 0 14px">아이가 <b>주 5일</b>을 달성하면 <b>스스로</b> 리워드를 받아요. 부모는 여기서 어떤 보상일지 정해두면 됩니다.</div>'+
        '<label class="setlbl">주간 리워드</label><input class="field" id="setItem" value="'+esc(item)+'" placeholder="예) 게임 30분">'+
        '<label class="setlbl" style="margin-top:12px">보너스 (선택)</label><input class="field" id="setBonus" value="'+esc(bonus)+'" placeholder="예) 주말 놀이공원 · 특별 간식">'+
        '<button class="claim go" id="setSave" style="margin-top:14px">'+ic('check')+'저장</button>'+
      '</div>'+
      '<h2>받은 리워드 <span class="cnt">'+got+'</span></h2>'+
      (got?'<div class="queue">'+st.rewards.slice(-6).reverse().map(function(r){ return '<div class="card qitem"><div class="qtitle">'+esc(r.item)+(r.bonus?' + '+esc(r.bonus):'')+'</div><div class="qdone ok">'+esc(r.week)+' 주 · 스스로 획득</div></div>'; }).join('')+'</div>':'<div class="card empty">아직 받은 리워드가 없어요.<br>아이가 주 5일을 달성하면 여기에 기록됩니다.</div>');
  }

  function bindTab(){
    app.querySelectorAll('.rcheck[data-t], .rmain[data-t]').forEach(function(el){
      el.onclick=function(){ var i=+el.dataset.t; var d=today(); if(!st.log[d]) st.log[d]=[false,false,false,false,false]; st.log[d][i]=!st.log[d][i]; save(); renderApp(); };
    });
    app.querySelectorAll('[data-wd]').forEach(function(el){
      el.onclick=function(){ var d=el.dataset.wd; if(d>today()) { toast('아직 오지 않은 날이에요'); return; } if(!st.log[d]) st.log[d]=[false,false,false,false,false]; var any=st.log[d].some(function(x){return x;}); for(var k=0;k<5;k++) st.log[d][k]=!any; save(); renderApp(); };
    });
    var cl=app.querySelector('[data-claim]'); if(cl) cl.onclick=function(){
      var mon=mondayOf(today());
      st.rewards.push({week:mon,item:rewardItem(),bonus:st.rewardBonus||''}); save();
      toast(rewardItem()+' 획득!'+(st.rewardBonus?' + '+st.rewardBonus:'')); st.tab='badge'; renderApp();
    };
    var ss=app.querySelector('#setSave'); if(ss) ss.onclick=function(){ var it=app.querySelector('#setItem').value.trim(), bo=app.querySelector('#setBonus').value.trim(); st.rewardItem=it||rewardItem(); st.rewardBonus=bo; save(); toast('보상을 저장했어요'); renderApp(); };
  }

  // ── AI 코치 챗봇 (코멘트 입력) ──
  function coachReply(msg){
    var lv=level(), hits=weekHits();
    if(/힘들|지쳐|포기|어렵|안 ?돼|못하/.test(msg)) return '괜찮아요. 오늘 1개만 해도 오늘은 성공이에요 — 안 하는 날만 없애면 돼요.';
    if(/했|끝|완료|다 ?함|성공/.test(msg)) return '잘했어요! 이렇게 하루씩 쌓이면 100일 뒤엔 큰나무예요. 지금 '+hits+'/5일.';
    if(/\?|어떻게|뭐|추천|도와/.test(msg)) return '작게 시작해요. 5개 중 제일 쉬운 1개부터 지금 3분만 해볼까요?';
    return '기록했어요. 이번 주 '+hits+'/5일, 지금 Lv.'+lv+' — 오늘도 한 칸 쌓아요.';
  }
  function chatSheetBody(){
    var msgs=(st.chat||[]).slice(-30);
    var body=msgs.length? msgs.map(function(m){ return '<div class="cmsg '+(m.from==='me'?'me':'coach')+'">'+esc(m.text)+'</div>'; }).join('')
      : '<div class="cmsg coach">필요한 건 언제든 여기 적어요. 오늘 어땠어요?</div>';
    return '<div class="sheet-head"><span class="chat-av">'+ic('flame')+'</span><div><div class="chat-nm">100일 코치</div><div class="chat-st">코멘트를 남기면 코치가 답해요</div></div><button class="sheet-x" id="sheetx" aria-label="닫기">✕</button></div>'+
      '<div class="chat-log" id="chatlog">'+body+'</div>'+
      '<div class="chat-in"><input id="chatinput" placeholder="오늘 코멘트·질문을 입력…" maxlength="200"><button id="chatsend" aria-label="보내기">'+ic('send')+'</button></div>';
  }
  function renderSheetBody(){ var sb=document.querySelector('#sheet .sheet-body'); if(!sb) return; sb.innerHTML=chatSheetBody(); bindSheetControls(); var l=sb.querySelector('#chatlog'); if(l) l.scrollTop=l.scrollHeight; }
  function bindSheetControls(){
    var x=document.getElementById('sheetx'); if(x) x.onclick=closeSheet;
    var inp=document.getElementById('chatinput'), snd=document.getElementById('chatsend'); if(!inp||!snd) return;
    function send(){ var v=inp.value.trim(); if(!v) return; if(!st.chat) st.chat=[]; st.chat.push({from:'me',text:v,d:today()}); st.chat.push({from:'coach',text:coachReply(v),d:today()}); if(st.chat.length>60) st.chat=st.chat.slice(-60); save(); renderSheetBody(); setTimeout(function(){ var i2=document.getElementById('chatinput'); if(i2) i2.focus(); },20); }
    snd.onclick=send; inp.onkeydown=function(e){ if(e.key==='Enter'){ e.preventDefault(); send(); } };
  }
  function openSheet(){ var s=document.getElementById('sheet'); if(!s) return; renderSheetBody(); s.classList.add('open'); s.setAttribute('aria-hidden','false'); }
  function closeSheet(){ var s=document.getElementById('sheet'); if(!s) return; s.classList.remove('open'); s.setAttribute('aria-hidden','true'); }
  function initChatUI(){ var fab=document.getElementById('fab'); if(fab){ fab.innerHTML=ic('flame'); fab.onclick=openSheet; } var bg=document.querySelector('#sheet .sheet-bg'); if(bg) bg.onclick=closeSheet; var grip=document.querySelector('#sheet .sheet-grip'); if(grip) grip.onclick=closeSheet; }

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]; }); }

  load();
  initChatUI();
  if(st && st.goals) renderApp(); else renderWizard();
})();
</script>
</body>
</html>
