<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f3f1ec" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f1117" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="作心百日">
<title>作心百日</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Noto+Serif+KR:wght@800;900&display=swap');
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css');
  :root{
    --bg:#f3f1ec; --surface:#ffffff; --surface2:#f8f7f3;
    --ink:#22262f; --ink2:#6a7080; --ink3:#9ba1ac; --line:#e7e4dc; --line2:#f0eee7;
    --accent:#32519e; --accent-ink:#ffffff; --accent-soft:#eaeef8;
    --ok:#1b7a4e; --ok-soft:#e4f2ea; --warn:#96690a; --bad:#b23a2f; --bad-soft:#f9e9e7;
    --shadow:0 1px 2px rgba(30,34,46,.05), 0 6px 18px rgba(30,34,46,.04); --r:16px;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0f1117; --surface:#181b23; --surface2:#1e222d; --ink:#e8e9ee; --ink2:#9aa1b3; --ink3:#666d7e; --line:#272b36; --line2:#20242e; --accent:#8ba3f2; --accent-ink:#0f1117; --accent-soft:#242b45; --ok:#4cc487; --ok-soft:#1a2d24; --warn:#d9a23a; --bad:#e06459; --bad-soft:#342220; --shadow:none; }
  }
  :root[data-theme="light"]{ --bg:#f3f1ec; --surface:#fff; --surface2:#f8f7f3; --ink:#22262f; --ink2:#6a7080; --ink3:#9ba1ac; --line:#e7e4dc; --line2:#f0eee7; --accent:#32519e; --accent-ink:#fff; --accent-soft:#eaeef8; --ok:#1b7a4e; --ok-soft:#e4f2ea; --warn:#96690a; --bad:#b23a2f; --bad-soft:#f9e9e7; --shadow:0 1px 2px rgba(30,34,46,.05),0 6px 18px rgba(30,34,46,.04); }
  :root[data-theme="dark"]{ --bg:#0f1117; --surface:#181b23; --surface2:#1e222d; --ink:#e8e9ee; --ink2:#9aa1b3; --ink3:#666d7e; --line:#272b36; --line2:#20242e; --accent:#8ba3f2; --accent-ink:#0f1117; --accent-soft:#242b45; --ok:#4cc487; --ok-soft:#1a2d24; --warn:#d9a23a; --bad:#e06459; --bad-soft:#342220; --shadow:none; }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; background:var(--bg); }
  body{ color:var(--ink); line-height:1.55; font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR",system-ui,sans-serif; -webkit-font-smoothing:antialiased; font-variant-numeric:tabular-nums; }
  .wrap{ max-width:560px; margin:0 auto; padding:0 16px 90px; }
  .ico{ display:block; width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }

  .top{ position:sticky; top:0; z-index:5; background:var(--bg); padding:16px 0 11px; border-bottom:1px solid var(--line2); margin-bottom:4px; }
  .top-row{ display:flex; align-items:baseline; gap:10px; }
  .top h1{ font-size:16.5px; margin:0; font-weight:800; letter-spacing:.02em; }
  .role-tag{ font-size:11px; font-weight:800; padding:2px 9px; border-radius:99px; }
  .role-tag.parent{ background:var(--accent-soft); color:var(--accent); }
  .role-tag.child{ background:var(--ok-soft); color:var(--ok); }
  .day{ font-size:16.5px; font-weight:800; color:var(--accent); }
  .gen{ margin-left:auto; font-size:11px; color:var(--ink3); }
  .progress{ height:4px; border-radius:99px; background:var(--line); margin-top:10px; overflow:hidden; }
  .progress i{ display:block; height:100%; border-radius:99px; background:var(--accent); transition:width .4s; }
  .cov{ font-size:11px; color:var(--ink3); margin-top:7px; }
  .tabbar{ display:flex; gap:6px; margin-top:10px; }
  .tabbar button{ flex:1; font:inherit; font-size:13px; font-weight:700; padding:8px 4px; border-radius:10px; border:1px solid var(--line); background:var(--surface); color:var(--ink2); cursor:pointer; }
  .tabbar button.on{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink); }
  .tab{ display:none; } .tab.on{ display:block; }

  h2{ display:flex; align-items:center; gap:8px; font-size:11.5px; letter-spacing:.16em; color:var(--ink2); margin:24px 0 10px; font-weight:800; }
  h2 .cnt{ font-size:11px; font-weight:700; background:var(--accent-soft); color:var(--accent); border-radius:99px; padding:1px 8px; letter-spacing:0; }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); }

  .rrow{ display:flex; align-items:center; gap:11px; padding:12px 14px; }
  .rrow + .rrow{ border-top:1px solid var(--line2); }
  .rcheck{ width:23px; height:23px; flex:none; border-radius:8px; border:1.5px solid var(--ink3); display:grid; place-items:center; cursor:pointer; background:transparent; transition:.15s; }
  .rcheck.on{ background:var(--ok); border-color:var(--ok); }
  .rcheck.on::after{ content:"✓"; color:#fff; font-size:13px; font-weight:800; }
  .rcheck.ro{ cursor:default; opacity:.9; }
  .ricon{ width:30px; height:30px; flex:none; display:grid; place-items:center; color:var(--accent); background:var(--accent-soft); border-radius:9px; }
  .ricon .ico{ width:18px; height:18px; }
  .rmain{ flex:1; min-width:0; cursor:pointer; user-select:none; overflow:hidden; }
  .rmain.ro{ cursor:default; }
  .rlabel{ font-size:14.5px; font-weight:600; }
  .rhint{ font-size:11px; color:var(--ink3); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .weekcard{ padding:14px; margin-top:12px; }
  .wk-head{ display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:800; }
  .wk-head .ico{ width:17px; height:17px; color:var(--accent); }
  .wk-sub{ font-size:12px; color:var(--ink2); margin:5px 0 11px; }
  .week{ display:flex; gap:5px; }
  .week span{ flex:1; aspect-ratio:1; border-radius:8px; background:var(--surface2); border:1.5px solid var(--line); display:grid; place-items:center; font-size:11px; font-weight:700; color:var(--ink3); }
  .week span.on{ background:var(--ok); border-color:var(--ok); color:#fff; }
  .week span.today{ border-color:var(--accent); border-width:2px; }
  .week span.tap{ cursor:pointer; }
  .wk-goal{ font-size:11.5px; color:var(--ink2); margin-top:10px; font-weight:600; }
  .wk-goal b{ color:var(--ok); }
  .claim{ width:100%; margin-top:11px; padding:11px; border:none; border-radius:12px; font:inherit; font-weight:800; font-size:13.5px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; }
  .claim .ico{ width:16px; height:16px; }
  .claim[disabled]{ background:var(--surface2); color:var(--ink3); box-shadow:inset 0 0 0 1.5px var(--line); cursor:not-allowed; }
  .claim.go{ background:var(--ok); color:#fff; }

  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .stat{ padding:13px 15px 14px; }
  .stat h3{ margin:0 0 7px; font-size:11px; color:var(--ink2); font-weight:800; letter-spacing:.08em; }
  .big{ font-size:25px; font-weight:800; letter-spacing:-.02em; line-height:1.15; }
  .big small{ font-size:12px; font-weight:600; color:var(--ink3); margin-left:2px; }
  .stat .sub{ font-size:12px; color:var(--ink2); margin-top:3px; }

  /* 배지 */
  .badges{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px 8px; padding:4px 2px 2px; }
  @media (max-width:400px){ .badges{ grid-template-columns:repeat(3,1fr); } }
  .badge{ text-align:center; }
  .bmedal{ position:relative; width:100%; max-width:70px; aspect-ratio:1; margin:0 auto 6px; }
  .bsvg{ display:block; width:100%; height:100%; overflow:visible; }
  .badge.bronze{ color:#c0824a; } .badge.silver{ color:#8f97a8; } .badge.gold{ color:#d29a2e; } .badge.legend{ color:var(--accent); }
  .bstar{ fill:currentColor; opacity:.32; transform-box:fill-box; transform-origin:center; }
  .bdisc{ fill:currentColor; }
  .bring{ fill:none; stroke:#fff; stroke-opacity:.55; stroke-width:1.4; }
  .bic path, .bic circle{ fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .badge.locked .bmedal{ filter:grayscale(1) opacity(.45); }
  .blk{ position:absolute; inset:0; display:grid; place-items:center; color:#fff; }
  .blk .ico{ width:20px; height:20px; opacity:.85; }
  .bname{ font-size:11px; font-weight:800; color:var(--ink); line-height:1.15; }
  .badge.locked .bname{ color:var(--ink3); }
  .bdesc{ font-size:9.5px; color:var(--ink3); margin-top:1px; }
  .badge.earned .bmedal{ animation:bfloat 3.6s ease-in-out infinite; }
  .badge.earned .bstar{ animation:bspin 9s linear infinite; }
  @keyframes bfloat{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
  @keyframes bspin{ to{transform:rotate(360deg)} }
  .badge.earned .bmedal::after{ content:""; position:absolute; left:12%; top:12%; width:76%; height:76%; border-radius:50%; pointer-events:none; background:linear-gradient(120deg,transparent 38%,rgba(255,255,255,.6) 50%,transparent 62%); background-size:250% 250%; animation:bshine 3.6s ease-in-out infinite; }
  @keyframes bshine{ 0%{background-position:160% 160%} 55%,100%{background-position:-60% -60%} }
  .issue{ display:flex; align-items:center; gap:15px; padding:16px; margin-bottom:6px; background:var(--accent-soft); border-color:color-mix(in srgb,var(--accent) 32%,var(--line)); }
  .issue .badge{ width:80px; flex:none; }
  .issue-t{ font-size:11px; font-weight:800; letter-spacing:.1em; color:var(--accent); }
  .issue-n{ font-size:18px; font-weight:800; margin-top:2px; }
  .issue-d{ font-size:12.5px; color:var(--ink2); margin-top:2px; }
  .badge-issue .bmedal{ animation:bissue 1.1s cubic-bezier(.2,.8,.3,1.5); }
  @keyframes bissue{ 0%{transform:scale(0) rotate(-40deg); opacity:0} 55%{transform:scale(1.18) rotate(10deg); opacity:1} 100%{transform:scale(1) rotate(0)} }

  /* 폼 / 위저드 */
  .field{ width:100%; padding:14px 15px; border:1.5px solid var(--line); border-radius:13px; background:var(--surface2); color:var(--ink); font:inherit; font-size:15px; }
  .field:focus{ outline:none; border-color:var(--accent); }
  .field::placeholder{ color:var(--ink3); opacity:1; }
  .setlbl{ display:block; font-size:11.5px; font-weight:800; color:var(--ink2); letter-spacing:.06em; margin:14px 0 6px; }
  .steps{ display:flex; gap:6px; height:4px; margin-bottom:22px; }
  .steps i{ flex:1; border-radius:9px; background:var(--line); transition:.35s; }
  .steps i.on{ background:var(--accent); } .steps i.did{ background:color-mix(in srgb,var(--accent) 55%,var(--line)); }
  .kicker{ font-size:12px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin:0 0 6px; }
  .q{ font-size:22px; font-weight:800; letter-spacing:-.01em; margin:0 0 6px; line-height:1.2; }
  .hint{ font-size:13.5px; color:var(--ink2); margin:0 0 18px; line-height:1.55; }
  .goals{ display:flex; flex-direction:column; gap:9px; }
  .goal-row{ display:flex; align-items:center; gap:10px; background:var(--surface2); border:1.5px solid var(--line); border-radius:13px; padding:8px 10px; }
  .goal-row .gi{ width:32px; height:32px; display:grid; place-items:center; color:var(--accent); flex:none; }
  .goal-row .gi .ico{ width:19px; height:19px; }
  .goal-row input{ border:none; background:transparent; font:inherit; font-size:14.5px; font-weight:600; color:var(--ink); width:100%; padding:6px 0; }
  .goal-row input:focus{ outline:none; }
  .goal-row input::placeholder{ color:var(--ink3); opacity:1; }
  .goal-row .min{ font-size:11.5px; color:var(--ink3); background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:4px 8px; white-space:nowrap; flex:none; }
  .seg{ display:flex; gap:8px; }
  .seg button{ flex:1; padding:16px 6px; border:1.5px solid var(--line); border-radius:14px; background:var(--surface2); color:var(--ink); font:inherit; cursor:pointer; }
  .seg button .bg{ display:block; font-size:22px; font-weight:800; }
  .seg button .lbl{ display:block; font-size:11.5px; color:var(--ink3); margin-top:3px; }
  .seg button.sel{ border-color:var(--accent); background:var(--accent-soft); } .seg button.sel .lbl{ color:var(--accent); }
  .nav{ display:flex; gap:10px; margin-top:24px; }
  .btn{ flex:1; padding:15px; border-radius:14px; border:none; font:inherit; font-weight:800; font-size:15px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:8px; }
  .btn .ico{ width:19px; height:19px; }
  .btn-primary{ background:var(--accent); color:var(--accent-ink); }
  .btn-ghost{ flex:0 0 auto; background:transparent; color:var(--ink2); border:1.5px solid var(--line); padding:0 20px; }
  .btn[disabled]{ opacity:.5; }

  /* 랜딩 / 링크 공유 */
  .hero{ text-align:center; padding:44px 6px 10px; }
  .hero .eyebrow{ display:inline-block; font-size:11px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); background:var(--accent-soft); padding:5px 11px; border-radius:99px; margin-bottom:16px; }
  .hero h1{ font-size:34px; font-weight:800; margin:0 0 12px; letter-spacing:-.02em; color:var(--accent); }
  .hero p{ color:var(--ink2); font-size:14.5px; margin:0 auto; line-height:1.6; max-width:340px; }
  .roles{ display:flex; flex-direction:column; gap:11px; margin-top:26px; }
  .rolecard{ display:flex; align-items:center; gap:14px; padding:17px; border:1.5px solid var(--line); border-radius:16px; background:var(--surface); text-align:left; cursor:pointer; width:100%; font:inherit; }
  .rolecard.pri{ border-color:var(--accent); background:var(--accent-soft); }
  .rolecard .ri{ width:46px; height:46px; border-radius:13px; display:grid; place-items:center; background:var(--surface); box-shadow:inset 0 0 0 1px var(--line); color:var(--accent); flex:none; }
  .rolecard .ri .ico{ width:24px; height:24px; }
  .rt{ display:block; font-weight:800; font-size:15.5px; } .rs{ display:block; font-size:12.5px; color:var(--ink2); margin-top:2px; }
  /* ── 랜딩 페이지 (作心三日 → 作心百日) ── */
  .lp{ animation:fade .5s ease both; }
  .lp-hero{ text-align:center; padding:40px 4px 8px; }
  .wordmark{ font-family:'Noto Serif KR',serif; font-weight:900; font-size:clamp(30px,9vw,44px); line-height:1.15; display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; }
  .wordmark .w3{ color:#c0392b; text-decoration:line-through; text-decoration-thickness:3px; opacity:.82; }
  .wordmark .warr{ color:var(--ink3); font-family:'IBM Plex Mono',monospace; font-weight:500; font-size:.62em; }
  .wordmark .w100{ color:var(--ink); } .wordmark .w100 b{ color:#2B4FD6; }
  @media (prefers-color-scheme:dark){ .wordmark .w100 b{ color:#8ba3f2; } .wordmark .w3{ color:#e06459; } }
  .lp-sub{ color:var(--ink2); font-size:15px; line-height:1.6; margin:16px auto 0; max-width:330px; }
  .lp-sub b{ color:var(--ink); font-weight:700; }
  .grid100{ display:grid; grid-template-columns:repeat(10,1fr); gap:3px; max-width:282px; margin:26px auto 0; }
  .grid100 i{ aspect-ratio:1; border-radius:2.5px; background:var(--line); }
  .grid100 i.stop{ background:repeating-linear-gradient(45deg,#c0392b,#c0392b 1.5px,transparent 1.5px,transparent 4px); box-shadow:inset 0 0 0 1px color-mix(in srgb,#c0392b 40%,transparent); }
  .grid100 i.fill{ background:#2B4FD6; opacity:0; transform:scale(.4); animation:cellin .35s cubic-bezier(.2,.8,.3,1.2) forwards; }
  @media (prefers-color-scheme:dark){ .grid100 i.fill{ background:#6d86e8; } }
  @keyframes cellin{ to{ opacity:1; transform:scale(1); } }
  .grid-cap{ text-align:center; font-size:13px; color:var(--ink2); margin:16px auto 0; }
  .grid-cap b{ font-family:'IBM Plex Mono',monospace; font-weight:600; }
  .grid-cap .r{ color:#c0392b; font-weight:700; } .grid-cap .b{ color:#2B4FD6; }
  @media (prefers-color-scheme:dark){ .grid-cap .b{ color:#8ba3f2; } .grid-cap .r{ color:#e06459; } }
  .lp-sec{ margin-top:30px; }
  .lp-h2{ font-size:12px; font-weight:800; letter-spacing:.14em; color:var(--ink2); text-transform:uppercase; margin:0 2px 12px; }
  .rewards-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .rew-chip{ font-size:12.5px; font-weight:600; color:var(--ink); background:var(--surface); border:1px solid var(--line); border-radius:99px; padding:8px 13px; }
  .rew-chip b{ font-family:'IBM Plex Mono',monospace; color:#2B4FD6; font-weight:600; }
  @media (prefers-color-scheme:dark){ .rew-chip b{ color:#8ba3f2; } }
  .faq-item{ border-top:1px solid var(--line2); padding:14px 2px; }
  .faq-item:first-child{ border-top:none; }
  .faq-q{ font-size:14.5px; font-weight:700; }
  .faq-a{ font-size:13px; color:var(--ink2); margin-top:5px; line-height:1.55; }
  .faq-a b{ color:var(--ink); }
  .lp-foot{ margin-top:32px; text-align:center; font-size:11px; color:var(--ink3); line-height:1.7; }
  @media (prefers-reduced-motion:reduce){ .grid100 i.fill{ opacity:1; transform:none; animation:none; } }
  .linkbox{ padding:16px; }
  .linkurl{ display:flex; gap:8px; margin-top:10px; }
  .linkurl input{ flex:1; min-width:0; padding:12px 13px; border:1.5px solid var(--line); border-radius:11px; background:var(--surface2); color:var(--ink2); font:inherit; font-size:12.5px; }
  .linkurl button{ flex:none; padding:0 16px; border:none; border-radius:11px; background:var(--accent); color:var(--accent-ink); font:inherit; font-weight:800; font-size:13px; cursor:pointer; }
  .loading{ text-align:center; color:var(--ink3); font-size:14px; padding:80px 0; }
  .spin{ width:26px; height:26px; margin:0 auto 12px; border:3px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:sp 1s linear infinite; }
  @keyframes sp{ to{ transform:rotate(360deg); } }
  .mon-child{ display:flex; align-items:center; gap:12px; padding:15px; }
  .mon-av{ width:44px; height:44px; border-radius:12px; display:grid; place-items:center; background:var(--ok-soft); color:var(--ok); flex:none; }
  .mon-av .ico{ width:24px; height:24px; }
  .mon-n{ font-weight:800; font-size:16px; } .mon-s{ font-size:12.5px; color:var(--ink2); margin-top:2px; }

  .footer{ margin-top:34px; font-size:11px; color:var(--ink3); line-height:1.7; text-align:center; }
  .reset{ background:none; border:none; color:var(--ink3); font:inherit; font-size:11px; cursor:pointer; text-decoration:underline; }
  #toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(16px); background:var(--ink); color:var(--bg); padding:10px 20px; border-radius:12px; font-size:13px; font-weight:600; opacity:0; transition:.25s; pointer-events:none; z-index:30; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* 코치 FAB + 시트 */
  #fab{ position:fixed; right:16px; bottom:calc(16px + env(safe-area-inset-bottom,0px)); z-index:8; width:54px; height:54px; border-radius:50%; border:none; background:var(--accent); color:var(--accent-ink); box-shadow:0 10px 26px -8px var(--accent),0 2px 6px rgba(0,0,0,.15); cursor:pointer; display:grid; place-items:center; }
  #fab:active{ transform:scale(.94); } #fab .ico{ width:25px; height:25px; } #fab[hidden]{ display:none; }
  #sheet{ position:fixed; inset:0; z-index:20; visibility:hidden; } #sheet.open{ visibility:visible; }
  .sheet-bg{ position:absolute; inset:0; background:rgba(10,12,20,.5); opacity:0; transition:.3s; } #sheet.open .sheet-bg{ opacity:1; }
  .sheet-card{ position:absolute; left:0; right:0; bottom:0; max-width:560px; margin:0 auto; background:var(--surface); border-radius:22px 22px 0 0; box-shadow:0 -12px 44px rgba(0,0,0,.28); transform:translateY(101%); transition:transform .34s cubic-bezier(.2,.85,.25,1); max-height:82vh; display:flex; flex-direction:column; padding-bottom:env(safe-area-inset-bottom,0px); }
  #sheet.open .sheet-card{ transform:translateY(0); }
  .sheet-grip{ width:40px; height:4px; border-radius:99px; background:var(--line); margin:10px auto 2px; flex:none; cursor:pointer; }
  .sheet-head{ display:flex; align-items:center; gap:11px; padding:10px 14px 12px; border-bottom:1px solid var(--line2); }
  .chat-av{ width:38px; height:38px; border-radius:11px; display:grid; place-items:center; background:var(--accent); color:var(--accent-ink); flex:none; } .chat-av .ico{ width:20px; height:20px; }

    pulse:'<path d="M3 13h4l2.2-6 3.2 12 2.4-6H21"/>',

    gift:'<rect x="4" y="9.5" width="16" height="10.5" rx="1.8"/><path d="M4 13.5h16"/><path d="M12 9.5V20"/><path d="M12 9.5C11.3 7 9 6.4 8 7.4c-1 1 .3 2.1 4 2.1zM12 9.5c.7-2.5 3-3.1 4-2.1 1 1-.3 2.1-4 2.1z" fill="currentColor" stroke="none"/>',
    check:'<path d="M4.5 12.5l4.5 4.5 10.5-11"/>',

    lock:'<rect x="5" y="10.5" width="14" height="9.5" rx="2.2"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5"/>',
    link:'<path d="M9 15l6-6"/><path d="M11 7l1-1a4 4 0 0 1 6 6l-1 1"/><path d="M13 17l-1 1a4 4 0 0 1-6-6l1-1"/>',
    copy:'<rect x="8" y="8" width="12" height="12" rx="2.5"/><path d="M16 8V5.5A1.5 1.5 0 0 0 14.5 4H5.5A1.5 1.5 0 0 0 4 5.5v9A1.5 1.5 0 0 0 5.5 16H8"/>',

  };
  function ic(k){ return '<svg class="ico" viewBox="0 0 24 24" aria-hidden="true">'+(IC[k]||'')+'</svg>'; }

  var BADGES=[
    {n:1,name:'첫걸음',desc:'첫 달성',tier:'bronze',icon:'flag'},{n:3,name:'작심삼일 돌파',desc:'3일 누적',tier:'bronze',icon:'flame'},
    {n:7,name:'첫 주 완성',desc:'7일 누적',tier:'silver',icon:'star'},{n:14,name:'2주 연속',desc:'14일 누적',tier:'silver',icon:'star'},
    {n:21,name:'습관 형성',desc:'21일 누적',tier:'gold',icon:'medal'},{n:50,name:'반환점',desc:'50일 누적',tier:'gold',icon:'trophy'},
    {n:75,name:'막판 스퍼트',desc:'75일 누적',tier:'gold',icon:'trophy'},{n:100,name:'作心百日 완주',desc:'100일 완주',tier:'legend',icon:'crown'}
  ];
  var BIC={ flag:'<path d="M6 3v18M6 4h12l-2.6 3.5L18 11H6"/>', star:'<path d="M12 3.2l2.7 5.5 6 .9-4.3 4.2 1 6-5.4-2.8-5.4 2.8 1-6L3.3 9.6l6-.9z"/>', medal:'<circle cx="12" cy="14" r="5.5"/><path d="M9.5 3l2.5 5 2.5-5"/><path d="M12 11.7l.9 1.9 2 .3-1.5 1.4.4 2-1.8-1-1.8 1 .4-2L9.1 13.9l2-.3z"/>', crown:'<path d="M4 8l3.5 3.5L12 5l4.5 6.5L20 8l-1.5 10h-13z"/><path d="M5.5 21h13"/>', flame:'<path d="M12 3c.6 3 3.8 4.5 3.8 8A3.8 3.8 0 0 1 8.2 11c0-1.4.6-2.4 1.2-3 .3 1 .9 1.6 1.6 1.6C11.6 8 11 5.5 12 3z"/>', trophy:'<path d="M7 4.5h10V8a5 5 0 0 1-10 0z"/><path d="M7 5.5H4.6A2.4 2.4 0 0 0 7 8M17 5.5h2.4A2.4 2.4 0 0 1 17 8"/><path d="M12 13v3M9.5 20h5M10 20l.4-3.2h3.2L14 20"/>' };
  function starburst(cx,cy,ro,ri,pts){ var p=''; for(var i=0;i<pts*2;i++){ var r=(i%2)?ri:ro, a=i/(pts*2)*6.2832-1.5708; p+=(i?'L':'M')+(cx+Math.cos(a)*r).toFixed(1)+' '+(cy+Math.sin(a)*r).toFixed(1); } return p+'Z'; }
  function badgeSVG(k){ return '<svg viewBox="0 0 64 64" class="bsvg" aria-hidden="true"><path class="bstar" d="'+starburst(32,32,27,20,12)+'"/><circle class="bdisc" cx="32" cy="32" r="18"/><circle class="bring" cx="32" cy="32" r="18"/><g class="bic" transform="translate(20 20)">'+(BIC[k]||'')+'</g></svg>'; }

  var EX_GOALS=[{t:'책 읽기',min:'하루 10p',ic:'book'},{t:'수학 문제집',min:'하루 2p',ic:'math'},{t:'영어 문장',min:'하루 3문장',ic:'globe'},{t:'줄넘기',min:'하루 100개',ic:'stopwatch'},{t:'감사일기',min:'하루 5분',ic:'journal'}];

  // ── 상태 ──
  var R=null, roomId=null, role=null, polling=null, dev='';
  function deviceId(){ var d=localStorage.getItem('jdev'); if(!d){ d='d'+Math.random().toString(36).slice(2,10)+Date.now().toString(36); try{localStorage.setItem('jdev',d);}catch(e){} } return d; }

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]; }); }
  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove('show');},1800); }
  function iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function today(){ return iso(new Date()); }
  function addDays(s,n){ var d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return iso(d); }
  function mondayOf(s){ var d=new Date(s+'T00:00:00'), w=(d.getDay()+6)%7; d.setDate(d.getDate()-w); return iso(d); }
  var kid=0, MAXKIDS=2;
  function C(){ return R.children[kid] || R.children[0]; }
  function dayNum(c){ c=c||C(); var s=c.start||R.createdAt||today(); return Math.floor((new Date(today()+'T00:00:00')-new Date(s+'T00:00:00'))/86400000)+1; }
  function dayDone(d,c){ c=c||C(); var l=c.log[d]; return !!l && l.some(function(x){return x;}); }
  function totalDone(c){ c=c||C(); var n=0,l=c.log; for(var k in l){ if(l[k]&&l[k].some(function(x){return x;})) n++; } return n; }
  function weekHits(c){ c=c||C(); var mon=mondayOf(today()),n=0; for(var i=0;i<7;i++){ if(dayDone(addDays(mon,i),c)) n++; } return n; }
  function badgeCount(c){ c=c||C(); var td=totalDone(c); return BADGES.filter(function(b){return td>=b.n;}).length; }

  // ── API (jsonblob 공유 방) ──
  function apiCreate(obj){ return fetch(KV,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(obj)}).then(function(res){ var loc=res.headers.get('Location'); return loc?loc.split('/').pop():null; }); }
  function apiGet(id){ return fetch(KV+'/'+id,{headers:{'Accept':'application/json'}}).then(function(res){ if(!res.ok) throw new Error('load'); return res.json(); }); }
  function apiPut(id,obj){ return fetch(KV+'/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(obj)}); }
  function apiDelete(id){ return fetch(KV+'/'+id,{method:'DELETE'}); }
  var putT=null;
  function saveRoom(){ if(!roomId||!R) return; clearTimeout(putT); putT=setTimeout(function(){ apiPut(roomId,R).catch(function(){}); },250); }
  function pruneBackups(){ try{ var now=Date.now(), wk=6048e5; for(var i=localStorage.length-1;i>=0;i--){ var k=localStorage.key(i); if(k&&k.indexOf('jbak_')===0){ var b; try{ b=JSON.parse(localStorage.getItem(k)); }catch(e){ b=null; } if(!b||!b.at||now-b.at>wk) localStorage.removeItem(k); } } }catch(e){} }
  function backupRoom(){ try{ localStorage.setItem('jbak_'+roomId, JSON.stringify({data:R, at:Date.now(), name:(R.children&&R.children[0]&&R.children[0].name)||''})); }catch(e){} pruneBackups(); }
  function recentBackups(){ pruneBackups(); var out=[]; try{ for(var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); if(k&&k.indexOf('jbak_')===0){ var b; try{ b=JSON.parse(localStorage.getItem(k)); }catch(e){ b=null; } if(b&&b.data) out.push({key:k,at:b.at,data:b.data,name:b.name}); } } }catch(e){} out.sort(function(a,b){return b.at-a.at;}); return out; }

  function parseHash(){ var h=location.hash.replace(/^#/,''), p={}; h.split('&').forEach(function(kv){ var a=kv.split('='); if(a[0]) p[a[0]]=decodeURIComponent(a[1]||''); }); return p; }
  function childLink(i){ return location.origin+location.pathname+'#room='+roomId+'&role=child&kid='+(i||0); }

  // ══════════ 진입 라우팅 ══════════
  function boot(){
    dev=deviceId();
    var p=parseHash();
    if(!p.room){
      var fb0=document.getElementById('fab'); if(fb0) fb0.hidden=true;
      if('start' in p){ role=null; roomId=null; renderParentSetup(); return; }
      location.replace('./'); return;   // 룸/스타트 없으면 랜딩(index.html)으로
    }
    roomId=p.room; role=p.role|| (localStorage.getItem('jr_'+roomId)) || 'child';
    kid=Math.max(0, parseInt(p.kid,10)||0);
    localStorage.setItem('jr_'+roomId, role);
    app.innerHTML='<div class="loading"><div class="spin"></div>방을 불러오는 중…</div>';
    apiGet(roomId).then(function(data){ R=migrate(data); if(kid>=R.children.length) kid=0; route(); startPoll(); })
      .catch(function(){ app.innerHTML='<div class="loading">방을 찾을 수 없어요. 링크가 만료됐을 수 있어요.<br><br><button class="btn btn-primary" onclick="location.hash=\'\';location.reload()" style="max-width:220px;margin:0 auto">처음으로</button></div>'; });
  }
  function migrate(d){ d=d||{}; if(!d.children){ d.children = d.child? [d.child] : [{}]; } delete d.child;
    if(!d.children.length) d.children=[{}];
    d.children.forEach(function(c){ c.goals=c.goals||[]; c.log=c.log||{}; c.rewards=c.rewards||[]; c.seenBadges=c.seenBadges||[]; c.chat=c.chat||[]; c.reward=c.reward||(d.reward||{item:'게임 30분',bonus:''}); c.name=c.name||''; c.start=c.start||''; });
    d.days=d.days||100; return d; }

  function route(){
    var fb=document.getElementById('fab');
    if(role==='parent'){ if(fb) fb.hidden=true; if(R.parentDev && R.parentDev!==dev){ blockScreen('parent'); return; } renderParent(); }
    else { var c=C(); if(c.goals.length===0){ if(fb) fb.hidden=true; renderChildWizard(); } else if(c.dev && c.dev!==dev){ if(fb) fb.hidden=true; blockScreen('child'); } else { if(fb) fb.hidden=false; renderChild(); } }
  }
  function blockScreen(kind){
    var msg = kind==='child' ? '이 방은 이미 다른 기기에서 시작했어요. 처음 시작한 기기에서 이어가 주세요.' : '이 방은 다른 기기에서 관리 중이에요.';
    var h='<div class="hero" style="padding-top:64px"><span style="display:grid;place-items:center;width:54px;height:54px;border-radius:15px;background:var(--surface2);box-shadow:inset 0 0 0 1px var(--line);color:var(--ink3);margin:0 auto 16px">'+ic('lock')+'</span><h1 style="font-size:22px;color:var(--ink)">다른 기기에서 사용 중</h1><p>'+msg+'</p></div>';
    if(kind==='parent') h+='<div class="nav" style="margin-top:22px"><button class="btn btn-primary" id="rebind">이 기기에서 이어받기</button></div>';

    var rb=document.getElementById('rebind'); if(rb) rb.onclick=function(){ R.parentDev=dev; saveRoom(); renderParent(); };
  }
  function startPoll(){ clearInterval(polling); polling=setInterval(function(){ if(!roomId) return; apiGet(roomId).then(function(data){ var fresh=JSON.stringify(migrate(data)); if(fresh!==JSON.stringify(R)){ R=JSON.parse(fresh); route(); } }).catch(function(){}); }, 12000); }

  function faq(q,a){ return '<div class="faq-item"><div class="faq-q">'+q+'</div><div class="faq-a">'+a+'</div></div>'; }

    var h='<div class="lp"><div class="lp-hero"><div class="wordmark"><span class="w3">作心三日</span><span class="warr">→</span><span class="w100">作心<b>百</b>日</span></div>'+
      '<p class="lp-sub">작심삼일로 끝나던 결심을, <b>100일</b>로. 부모가 만들고 아이가 매일 채우는 습관 트래커.</p></div>'+

      '<div class="roles" style="margin-top:30px"><button class="rolecard pri" id="startParent"><span class="ri">'+ic('parent')+'</span><span><span class="rt">부모로 시작하기</span><span class="rs">플랜·보상 만들고 아이에게 링크 전달</span></span></button>'+
      '<div class="rolecard" style="cursor:default"><span class="ri">'+ic('child')+'</span><span><span class="rt">아이는 링크로 들어와요</span><span class="rs">부모가 보낸 카톡 링크를 열면 시작</span></span></div></div>';
    if(baks.length){ var b=baks[0]; h+='<div class="card" style="margin-top:14px;padding:14px 15px"><div style="font-size:12.5px;color:var(--ink2)">최근 초기화한 방 · 7일 내 복구 가능</div><button class="claim go" id="restoreBtn" style="margin-top:10px">'+ic('refresh')+(b.name?esc(b.name)+' ':'')+'방 복구하기</button></div>'; }
    h+='<div class="lp-sec"><div class="lp-h2">보상 예시 · 부모가 정해요</div><div class="rewards-row"><span class="rew-chip">게임 <b>30분</b></span><span class="rew-chip">주말 나들이</span><span class="rew-chip">치킨 파티</span><span class="rew-chip">용돈 <b>+α</b></span></div></div>';
    h+='<div class="lp-sec"><div class="lp-h2">자주 묻는 질문</div>'+
      faq('하루라도 빠지면 실패인가요?','아니요. 하루 5가지 중 <b>1개만 해도 그날은 달성</b>이에요. 완벽이 아니라 "안 하는 날 없애기"가 목표예요.')+
      faq('아이가 여러 명이면?','부모 한 계정에서 <b>최대 2명</b>까지, 아이마다 별도 링크·목표·보상으로 관리해요.')+
      faq('데이터는 안전한가요?','부모·아이가 <b>같은 방을 공유</b>하고 기기에 저장돼요. 부모가 초기화하면 모두 삭제되고 <b>7일간 백업</b>됩니다.')+
      faq('돈이 드나요?','<b>무료</b>예요. 설치 없이 링크만 있으면 바로 시작해요.')+
      '</div><div class="lp-foot">作心百日 · 3일이 아니라 100일. 끝엔 습관이 남아요.</div></div>';
    app.innerHTML=h;
    document.getElementById('startParent').onclick=renderParentSetup;

  // ══════════ 부모 화면: 모니터 + 보상 + 링크 ══════════
  function renderParent(){

    var pr=app.querySelector('#preset'); if(pr) pr.onclick=function(){ if(confirm('정말 초기화할까요?\n\n아이 데이터를 포함해 이 방이 모두 삭제됩니다. 아이 링크도 더는 열리지 않아요.\n(만약을 위해 7일간 백업해 둡니다.)')){ backupRoom(); apiDelete(roomId).catch(function(){}); localStorage.removeItem('jr_'+roomId); clearInterval(polling); toast('초기화됨 · 7일간 백업 보관'); setTimeout(function(){ location.hash=''; location.reload(); },500); } };
  }
  function childBlock(c,i){
    var setup=c.goals.length>0, dn=dayNum(c), td=totalDone(c), nm=c.name||('아이 '+(i+1));

    h+='<label class="setlbl">아이용 링크 (카톡 전송)</label><div class="linkurl"><input class="clink" data-i="'+i+'" readonly value="'+esc(childLink(i))+'"><button class="ccopy" data-i="'+i+'">'+ic('copy')+' 복사</button></div>';
    if(setup){ var log=c.log[today()]||[]; var mon=mondayOf(today()),cells='',lbl=['월','화','수','목','금','토','일'];
      for(var k=0;k<7;k++){ var dd=addDays(mon,k); cells+='<span class="'+(dayDone(dd,c)?'on':'')+(dd===today()?' today':'')+'">'+(dayDone(dd,c)?'✓':lbl[k])+'</span>'; }
      h+='<div style="margin-top:13px;font-size:12.5px;color:var(--ink2)">오늘 <b style="color:var(--ink)">'+log.filter(Boolean).length+'/'+c.goals.length+'</b> 액션 · 누적 '+td+'일 · 배지 '+badgeCount(c)+'개</div><div class="week" style="margin-top:8px">'+cells+'</div><div class="wk-goal" style="margin-top:8px">이번 주 <b>'+weekHits(c)+'</b>/5일 달성</div>';
    } else { h+='<div style="margin-top:13px;font-size:12.5px;color:var(--ink3)">아직 시작 전 — 링크를 열면 목표를 정해요.</div>'; }
    h+='<label class="setlbl">주간 리워드</label><input class="field rwi" data-i="'+i+'" value="'+esc(c.reward.item)+'" placeholder="예) 게임 30분"><label class="setlbl">보너스 (선택)</label><input class="field rwb" data-i="'+i+'" value="'+esc(c.reward.bonus||'')+'" placeholder="예) 주말 놀이공원"><button class="claim go rwsave" data-i="'+i+'" style="margin-top:12px">'+ic('check')+'이 아이 저장</button>';
    if(R.children.length>1) h+='<button class="reset delkid" data-i="'+i+'" style="margin-top:12px;display:block">이 아이 삭제</button>';
    return h+'</div>';
  }
  function bindChildBlock(i){
    var cp=app.querySelector('.ccopy[data-i="'+i+'"]'); if(cp) cp.onclick=function(){ var inp=app.querySelector('.clink[data-i="'+i+'"]'); inp.select(); try{navigator.clipboard.writeText(inp.value);}catch(e){} try{document.execCommand('copy');}catch(e){} toast('링크 복사됨 — 카톡에 붙여넣기'); };
    var rs=app.querySelector('.rwsave[data-i="'+i+'"]'); if(rs) rs.onclick=function(){ var ch=R.children[i]; var nm=app.querySelector('.cname[data-i="'+i+'"]'); if(nm) ch.name=nm.value.trim(); ch.reward.item=(app.querySelector('.rwi[data-i="'+i+'"]').value.trim()||'게임 30분'); ch.reward.bonus=app.querySelector('.rwb[data-i="'+i+'"]').value.trim(); saveRoom(); toast('저장했어요'); renderParent(); };
    var dk=app.querySelector('.delkid[data-i="'+i+'"]'); if(dk) dk.onclick=function(){ if(confirm('이 아이를 삭제할까요? 되돌릴 수 없어요.')){ R.children.splice(i,1); saveRoom(); renderParent(); } };

  // ══════════ 아이: 목표 5개 신규 설정 (위저드) ══════════

        '<div class="nav"><button class="btn btn-primary" id="cwDone">'+ic('flame')+'100일 시작하기</button></div></div>';

  // ══════════ 아이 화면: 오늘 / 배지 ══════════
  var ctab='today';
  function renderChild(){
    document.getElementById('fab').hidden=false;
    var c=C(), dn=dayNum(), pct=Math.max(0,Math.min(100,Math.round((dn-1)/R.days*100)));
    var tabs=[['today','오늘'],['badge','배지']];

    var h='<div class="top"><div class="top-row"><h1>作心百日</h1><span class="role-tag child">'+(c.name?esc(c.name):'아이')+'</span><span class="day">D-'+Math.max(0,R.days-dn+1)+'</span><span class="gen">DAY '+dn+' / '+R.days+' · 배지 '+badgeCount()+'개</span></div>'+
      '<div class="progress"><i style="width:'+pct+'%"></i></div><div class="cov">이번 주 '+weekHits()+'/7일 달성</div>'+
      '<div class="tabbar">'+tabs.map(function(t){ return '<button class="'+(ctab===t[0]?'on':'')+'" data-tab="'+t[0]+'">'+t[1]+'</button>'; }).join('')+'</div></div><div id="tabc"></div>'+

  function childToday(){
    var c=C(), d=today(), log=c.log[d]||[false,false,false,false,false];
    var rows=c.goals.map(function(g,i){ return '<div class="rrow"><span class="ricon">'+ic(g.ic)+'</span><div class="rmain" data-t="'+i+'"><div class="rlabel">'+esc(g.t)+'</div><div class="rhint">최소 '+esc(g.min)+' · 1개만 해도 오늘 달성</div></div><div class="rcheck '+(log[i]?'on':'')+'" data-t="'+i+'"></div></div>'; }).join('');
    var d14=''; var m14=addDays(d,-13); for(var i=0;i<14;i++){ var dd=addDays(m14,i); d14+='<i style="width:6px;height:14px;border-radius:3px;background:'+(dayDone(dd)?'var(--ok)':'var(--line)')+';'+(dd===d?'outline:1.5px solid var(--accent);outline-offset:1px;':'')+'"></i>'; }
    return '<h2>오늘 할 일 <span class="cnt">'+log.filter(Boolean).length+'/'+c.goals.length+'</span></h2><div class="card">'+rows+'</div>'+
      '<div class="card" style="padding:11px 14px;margin-top:12px;display:flex;align-items:center;gap:10px"><span style="font-size:11.5px;font-weight:800;color:var(--ink2);letter-spacing:.06em">최근 14일</span><div style="display:flex;gap:2.5px;flex:1;justify-content:flex-end">'+d14+'</div></div>'+weekBlockChild();
  }
  function weekBlockChild(){
    var mon=mondayOf(today()), td=today(), hits=weekHits(), lbl=['월','화','수','목','금','토','일'];
    var cells=''; for(var i=0;i<7;i++){ var dd=addDays(mon,i); cells+='<span class="tap '+(dayDone(dd)?'on':'')+(dd===td?' today':'')+'" data-wd="'+dd+'">'+(dayDone(dd)?'✓':lbl[i])+'</span>'; }
    var claimed=C().rewards.some(function(r){return r.week===mon;}); var item=R.reward.item, bonus=R.reward.bonus||'';
    var btn = claimed? '<button class="claim go" disabled>'+ic('check')+'이번 주 리워드 획득 완료</button>'
      : hits>=5? '<button class="claim go" data-claim="1">'+ic('gift')+'이번 주 리워드 받기</button>'
      : '<button class="claim" disabled>'+ic('lock')+(5-hits)+'일 더 채우면 리워드</button>';
    return '<div class="card weekcard"><div class="wk-head">'+ic('gift')+'이번 주 리워드 · '+esc(item)+'</div><div class="wk-sub">5일 달성하면 스스로 받아요.'+(bonus?' 보너스: '+esc(bonus):'')+' (부모님이 정한 보상)</div><div class="week">'+cells+'</div><div class="wk-goal">목표 5일 · <b>'+hits+'</b>/5일</div>'+btn+'</div>';
  }
  function childBadges(){
    var td=totalDone(), earned=BADGES.filter(function(b){return td>=b.n;}), seen=C().seenBadges||[];
    var news=earned.filter(function(b){return seen.indexOf(b.n)<0;}), hero='';
    if(news.length){ var nb=news[news.length-1]; hero='<div class="card issue"><div class="badge '+nb.tier+' earned badge-issue"><div class="bmedal">'+badgeSVG(nb.icon)+'</div></div><div><div class="issue-t">새 배지 획득</div><div class="issue-n">'+esc(nb.name)+'</div><div class="issue-d">'+esc(nb.desc)+'</div></div></div>'; C().seenBadges=seen.concat(news.map(function(b){return b.n;})); saveRoom(); }
    var next=null; for(var k=0;k<BADGES.length;k++){ if(td<BADGES[k].n){ next=BADGES[k]; break; } }
    var prog=next?'<div class="card" style="padding:14px"><div style="font-size:12px;color:var(--ink2);margin:0 0 9px"><b>누적 '+td+'일</b> · 다음 배지 «'+esc(next.name)+'»까지 '+(next.n-td)+'일</div><div style="height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;box-shadow:inset 0 0 0 1px var(--line)"><i style="display:block;height:100%;background:var(--accent);width:'+Math.min(100,Math.round(td/next.n*100))+'%"></i></div></div>':'<div class="card" style="padding:14px;font-size:13px"><b>모든 배지 획득!</b> 누적 '+td+'일 완주.</div>';
    var grid='<div class="badges">'+BADGES.map(function(b){ var e=td>=b.n; return '<div class="badge '+b.tier+' '+(e?'earned':'locked')+'"><div class="bmedal">'+badgeSVG(b.icon)+(e?'':'<span class="blk">'+ic('lock')+'</span>')+'</div><div class="bname">'+esc(b.name)+'</div><div class="bdesc">'+(e?esc(b.desc):b.n+'일')+'</div></div>'; }).join('')+'</div>';

  function bindChild(){
    app.querySelectorAll('.rcheck[data-t], .rmain[data-t]').forEach(function(el){ el.onclick=function(){ var i=+el.dataset.t, d=today(); if(!C().log[d]) C().log[d]=[]; while(C().log[d].length<C().goals.length) C().log[d].push(false); C().log[d][i]=!C().log[d][i]; saveRoom(); renderChild(); }; });

    var cl=app.querySelector('[data-claim]'); if(cl) cl.onclick=function(){ C().rewards.push({week:mondayOf(today()),item:R.reward.item,bonus:R.reward.bonus||''}); saveRoom(); toast(R.reward.item+' 획득!'+(R.reward.bonus?' + '+R.reward.bonus:'')); ctab='badge'; renderChild(); };
  }

  // ── 코치 시트 (아이용) ──
  function coachReply(msg){ var hits=weekHits();
    if(/힘들|지쳐|포기|어렵|안 ?돼|못하|싫/.test(msg)) return '괜찮아요. 오늘 1개만 해도 오늘은 성공이에요 — 안 하는 날만 없애면 돼요.';
    if(/했|끝|완료|다 ?함|성공/.test(msg)) return '잘했어요! 이렇게 쌓이면 배지도 늘어요. 지금 이번 주 '+hits+'/5일.';
    if(/\?|어떻게|뭐|추천|도와/.test(msg)) return '작게 시작해요. 제일 쉬운 1개부터 지금 3분만 해볼까요?';
    return '기록했어요. 이번 주 '+hits+'/5일 — 오늘도 한 칸 쌓아요.';
  }
  function coachRespond(msg){
    if(COACH_API){ return fetch(COACH_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,secret:COACH_SECRET,name:C().name||'아이',week:weekHits(),total:totalDone(),day:dayNum(),goals:(C().goals||[]).map(function(g){return g.t;}),history:(C().chat||[]).slice(-8)})}).then(function(r){return r.json();}).then(function(d){ return (d&&(d.reply||d.text))||coachReply(msg); }).catch(function(){ return coachReply(msg); }); }
    return Promise.resolve(coachReply(msg));
  }
  function chatSheetBody(){
    var msgs=(C().chat||[]).slice(-30);
    var body=msgs.length? msgs.map(function(m){ return '<div class="cmsg '+(m.from==='me'?'me':'coach')+'">'+esc(m.text)+'</div>'; }).join('') : '<div class="cmsg coach">필요한 건 언제든 여기 적어요. 오늘 어땠어요?</div>';
    return '<div class="sheet-head"><span class="chat-av">'+ic('flame')+'</span><div><div class="chat-nm">100일 코치</div><div class="chat-st">코멘트를 남기면 코치가 답해요</div></div><button class="sheet-x" id="sheetx">✕</button></div><div class="chat-log" id="chatlog">'+body+'</div><div class="chat-in"><input id="chatinput" placeholder="오늘 코멘트·질문을 입력…" maxlength="200"><button id="chatsend">'+ic('send')+'</button></div>';
  }
  function renderSheetBody(){ var sb=document.querySelector('#sheet .sheet-body'); if(!sb) return; sb.innerHTML=chatSheetBody(); var x=document.getElementById('sheetx'); if(x) x.onclick=closeSheet; var inp=document.getElementById('chatinput'), snd=document.getElementById('chatsend'); if(inp&&snd){ var send=function(){ var v=inp.value.trim(); if(!v) return; inp.value=''; if(!C().chat) C().chat=[]; C().chat.push({from:'me',text:v,d:today()}); C().chat.push({from:'coach',text:'…',pending:true,d:today()}); renderSheetBody(); coachRespond(v).then(function(reply){ var ch=C().chat; for(var j=ch.length-1;j>=0;j--){ if(ch[j].pending){ ch[j]={from:'coach',text:reply,d:today()}; break; } } if(ch.length>60) C().chat=ch.slice(-60); saveRoom(); renderSheetBody(); }); }; snd.onclick=send; inp.onkeydown=function(e){ if(e.key==='Enter'){ e.preventDefault(); send(); } }; } var l=sb.querySelector('#chatlog'); if(l) l.scrollTop=l.scrollHeight; }
  function openSheet(){ var s=document.getElementById('sheet'); renderSheetBody(); s.classList.add('open'); s.setAttribute('aria-hidden','false'); }
  function closeSheet(){ var s=document.getElementById('sheet'); if(s){ s.classList.remove('open'); s.setAttribute('aria-hidden','true'); } }

  (function initSheet(){
    var fab=document.getElementById('fab'); if(fab){ fab.innerHTML=ic('flame'); fab.onclick=openSheet; }
    var bg=document.querySelector('#sheet .sheet-bg'); if(bg) bg.onclick=closeSheet;
    var g=document.querySelector('#sheet .sheet-grip'); if(g) g.onclick=closeSheet;
    var card=document.querySelector('#sheet .sheet-card');
    if(card){ var sy=0, dy=0, on=false;
      function inHandle(t){ return !!(t.closest('.sheet-grip') || (t.closest('.sheet-head') && !t.closest('button'))); }
      card.addEventListener('touchstart', function(e){ if(!inHandle(e.target)){ on=false; return; } on=true; sy=e.touches[0].clientY; dy=0; card.style.transition='none'; }, {passive:true});
      card.addEventListener('touchmove', function(e){ if(!on) return; dy=Math.max(0, e.touches[0].clientY-sy); card.style.transform='translateY('+dy+'px)'; if(dy>2 && e.cancelable) e.preventDefault(); }, {passive:false});
      function endDrag(){ if(!on) return; on=false; card.style.transition=''; card.style.transform=''; if(dy>90) closeSheet(); }
      card.addEventListener('touchend', endDrag); card.addEventListener('touchcancel', endDrag);
    }
  })();
  window.addEventListener('hashchange', boot);
  boot();
})();
</script>
